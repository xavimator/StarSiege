<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Star Siege</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;1,100;1,200&family=Rajdhani:wght@300;400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#ff6b35;--c2:#4ecdc4;
  --bg:#010915;--surf:#030d1c;--border:#0a1628;
  --text:#e8f4ff;--muted:#5a8fd4;--div:rgba(30,80,160,.4);
}
html,body{height:100%;overflow:hidden;touch-action:none;}
body{
  font-family:'Rajdhani',sans-serif;font-weight:300;
  height:100dvh;display:flex;flex-direction:column;
  background:var(--bg);color:var(--text);user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
}
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none;}
#nebula{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 15% 55%,rgba(8,35,110,.2) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 85% 25%,rgba(5,20,80,.15) 0%,transparent 65%),
    radial-gradient(ellipse 45% 65% at 50% 90%,rgba(6,28,95,.12) 0%,transparent 70%);
}

/* TOPBAR */
#topbar{
  position:relative;z-index:20;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 10px;
  background:linear-gradient(180deg,rgba(3,13,28,.97),rgba(1,9,21,.93));
  border-bottom:1px solid var(--div);gap:6px;backdrop-filter:blur(10px);
  overflow:hidden;min-width:0;
}
#game-title{
  font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;
  font-size:clamp(1rem,3.5vw,1.5rem);letter-spacing:5px;color:#a8d4ff;
  text-transform:uppercase;text-shadow:0 0 20px rgba(80,140,255,.35);white-space:nowrap;
  flex-shrink:0;
}
#phase-msg{
  font-family:'Rajdhani',sans-serif;font-weight:300;
  font-size:clamp(.75rem,2vw,1rem);color:var(--muted);
  letter-spacing:2px;text-align:center;flex:1;text-transform:uppercase;
  overflow:hidden;min-width:0;
}
#phase-msg b{color:var(--text);font-weight:400;}
#scores{display:flex;gap:6px;flex-shrink:0;align-items:center;}
.sb{text-align:center;}
.sb-lbl{font-family:'Exo 2',sans-serif;font-weight:200;font-size:.55rem;letter-spacing:2px;opacity:.4;display:block;}
.sb-val{font-family:'Exo 2',sans-serif;font-weight:100;font-size:clamp(1.2rem,4vw,1.8rem);letter-spacing:2px;}
#sb1 .sb-val{color:var(--c1);text-shadow:0 0 10px var(--c1)44;}
#sb2 .sb-val{color:var(--c2);text-shadow:0 0 10px var(--c2)44;}
#turn-bar{width:3px;height:26px;border-radius:2px;flex-shrink:0;background:var(--muted);transition:background .4s,box-shadow .4s;}
#turn-bar.t1{background:var(--c1);box-shadow:0 0 8px var(--c1)88;}
#turn-bar.t2{background:var(--c2);box-shadow:0 0 8px var(--c2)88;}
#phase-msg{display:none;}
#pips-row{display:none;}
.pg{display:flex;gap:2px;}
.pip{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .2s;}
.pip.sunk{background:#0d1e35;}
.pip.cur1{background:var(--c1);box-shadow:0 0 4px var(--c1)99;}
.pip.cur2{background:var(--c2);box-shadow:0 0 4px var(--c2)99;}

#game-shell{display:none;flex-direction:column;flex:1;overflow:hidden;}
#game-shell.show{display:flex;}
/* ARENA */
#arena{position:relative;z-index:5;display:flex;flex-direction:column;flex:1;overflow:hidden;}
.panel{flex:1;position:relative;overflow:hidden;touch-action:manipulation;}
.panel.can-click{cursor:crosshair;}
.panel.no-click{pointer-events:none;}
#panel-top{border-bottom:1px solid var(--div);background:linear-gradient(180deg,rgba(2,10,26,.28),rgba(1,7,18,.08));}
#panel-bot{background:linear-gradient(0deg,rgba(2,10,26,.28),rgba(1,7,18,.08));}
.ptag{
  position:absolute;top:7px;left:11px;
  font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;
  font-size:clamp(.64rem,1.6vw,.88rem);letter-spacing:5px;
  pointer-events:none;opacity:.08;text-transform:uppercase;
}
#panel-top .ptag{color:var(--c1);}
#panel-bot .ptag{color:var(--c2);}

/* MARKS */
.mk{position:absolute;pointer-events:none;transform:translate(-50%,-50%);transition:left .6s ease,top .6s ease;}
.mk svg{display:block;}
.mk.no-transition{transition:none;}

/* MINI EXPLOSION */
@keyframes explode{
  0%  {transform:translate(-50%,-50%) scale(.2);opacity:1;}
  60% {transform:translate(-50%,-50%) scale(1.4);opacity:.8;}
  100%{transform:translate(-50%,-50%) scale(2);opacity:0;}
}
.mini-exp{position:absolute;pointer-events:none;transform:translate(-50%,-50%);animation:explode .5s ease-out forwards;}

/* PICKER */
#picker{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:linear-gradient(0deg,rgba(3,13,28,.98),rgba(3,13,28,.92));
  border-top:1px solid var(--div);padding:6px 10px 8px;
  display:flex;align-items:center;gap:6px;backdrop-filter:blur(12px);
  transform:translateY(0);transition:transform .25s ease;
}
#picker.hide{transform:translateY(100%);}
#picker-msg{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.72rem;
  letter-spacing:2px;text-transform:uppercase;white-space:nowrap;
  flex-shrink:0;line-height:1.3;
}
#picker-btns{display:flex;gap:4px;align-items:center;}
.pBtn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 7px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);
  cursor:pointer;border-radius:2px;transition:border-color .15s,background .15s;
}
.pBtn.selected{background:rgba(255,255,255,.09);}
.pBtn.disabled{opacity:.25;cursor:default;}
.pBtn-shape{display:flex;align-items:center;justify-content:center;height:22px;}
.pBtn-count{font-family:'Exo 2',sans-serif;font-weight:300;font-size:.65rem;letter-spacing:1px;opacity:.9;}
#rand-btn{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.62rem;letter-spacing:2px;
  padding:5px 10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);
  cursor:pointer;border-radius:2px;color:var(--text);text-transform:uppercase;white-space:nowrap;
  flex-shrink:0;transition:background .15s;
}
#rand-btn:hover{background:rgba(255,255,255,.1);}

/* TOAST */
#toast{
  position:fixed;left:50%;bottom:14px;transform:translateX(-50%) translateY(80px);
  z-index:50;pointer-events:none;
  display:flex;align-items:center;gap:10px;padding:6px 14px;
  background:rgba(3,13,28,.93);border:1px solid var(--div);border-radius:3px;
  backdrop-filter:blur(10px);transition:transform .22s ease,opacity .22s ease;opacity:0;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#toast-err{font-family:'Exo 2',sans-serif;font-weight:100;font-size:clamp(1.8rem,6vw,2.8rem);letter-spacing:3px;}
#toast-err.perfect{color:#e8ff00;text-shadow:0 0 12px #e8ff0077;}
#toast-err.good{color:#7dff7d;text-shadow:0 0 10px #7dff7d55;}
#toast-err.ok{color:#ffcc00;}
#toast-err.bad{color:#ff4444;}
#toast-msg{font-family:'Rajdhani',sans-serif;font-weight:300;font-size:.96rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}

/* HANDOFF LABEL */
#handoff-veil{
  position:absolute;inset:0;z-index:15;
  display:flex;align-items:center;justify-content:center;
  pointer-events:all;opacity:0;transition:opacity .2s;
  background:transparent;
}
#handoff-veil.show{opacity:1;}
#handoff-veil.hide{opacity:0;pointer-events:none;}
#hv-msg{
  font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;
  font-size:clamp(1.2rem,5vw,2rem);letter-spacing:5px;
  text-transform:uppercase;
  color:transparent;
  -webkit-text-stroke:1.5px currentColor;
  text-shadow:none;
  pointer-events:none;
}
#hv-btn{
  position:absolute;inset:0;width:100%;height:100%;
  background:transparent;border:none;cursor:pointer;
  opacity:0;
}

/* FINAL */
#final-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(1,9,21,.97);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:20px;text-align:center;opacity:0;pointer-events:none;transition:opacity .3s;
}
#final-overlay.show{opacity:1;pointer-events:all;}
#fo-title{font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;font-size:clamp(2rem,10vw,3.6rem);letter-spacing:7px;color:#a8d4ff;text-transform:uppercase;text-shadow:0 0 24px rgba(80,140,255,.3);}
#fo-winner{font-family:'Exo 2',sans-serif;font-weight:200;font-style:italic;font-size:clamp(1.6rem,6vw,2.2rem);letter-spacing:4px;text-transform:uppercase;}
#fo-table{display:flex;flex-direction:column;gap:3px;width:100%;max-width:420px;max-height:40vh;overflow-y:auto;}
.ftr{display:grid;grid-template-columns:1.2rem 1fr 1fr .9fr;gap:6px;align-items:center;
  font-family:'Rajdhani',sans-serif;font-weight:300;font-size:.92rem;letter-spacing:1px;text-transform:uppercase;
  padding:3px 8px;background:rgba(3,13,28,.8);border-radius:2px;}
.ftr.hdr{color:var(--muted);font-size:.8rem;background:transparent;}
.fe1{color:var(--c1);font-weight:400;text-align:right;}
.fe2{color:var(--c2);font-weight:400;text-align:right;}
.few{text-align:right;font-size:.8rem;}
.fen{color:var(--muted);}
#fo-totals{display:flex;gap:24px;justify-content:center;}
.fo-tot{text-align:center;}
.fo-tot-lbl{font-family:'Exo 2',sans-serif;font-weight:200;font-size:.72rem;letter-spacing:3px;opacity:.4;display:block;margin-bottom:3px;text-transform:uppercase;}
.fo-tot-val{font-family:'Exo 2',sans-serif;font-weight:100;font-size:clamp(1.7rem,6vw,2.4rem);letter-spacing:2px;}
#fo-t1 .fo-tot-val{color:var(--c1);}
#fo-t2 .fo-tot-val{color:var(--c2);}
.fo-btn{font-family:'Exo 2',sans-serif;font-weight:200;font-size:1.24rem;letter-spacing:4px;padding:9px 24px;border:none;cursor:pointer;text-transform:uppercase;background:rgba(100,160,255,.1);color:#a8d4ff;border:1px solid rgba(80,130,220,.2);transition:transform .1s,background .15s;}
.fo-btn:hover{transform:scale(1.04);background:rgba(100,160,255,.18);}
.tag{font-family:'Exo 2',sans-serif;font-weight:200;font-size:.76rem;letter-spacing:2px;padding:2px 6px;}
.tg1{background:var(--c1);color:#000;}.tg2{background:var(--c2);color:#000;}.tgt{background:#0d1e35;color:var(--text);}
</style>

.lobby-btn{

}
#lobby-url-box{
  display:none;flex-direction:column;gap:6px;width:100%;max-width:300px;
}
#lobby-url-box.show{display:flex;}
#lobby-url{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.62rem;
  letter-spacing:1px;padding:7px 10px;word-break:break-all;
  background:rgba(168,212,255,.07);border:1px solid rgba(168,212,255,.2);
  color:#a8d4ff;border-radius:2px;text-align:center;
}
#lobby-copy{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.65rem;
  letter-spacing:3px;padding:6px;border:1px solid rgba(168,212,255,.25);
  background:rgba(168,212,255,.06);color:#a8d4ff;cursor:pointer;
  text-transform:uppercase;border-radius:2px;transition:background .15s;
}
#lobby-copy:hover{background:rgba(168,212,255,.12);}
/* INVASION ALERT */
#invasion-alert{
  position:fixed;inset:0;z-index:180;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;pointer-events:none;opacity:0;
  transition:opacity .4s;
}
#invasion-alert.show{opacity:1;}
#invasion-title{
  font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;
  font-size:clamp(1.1rem,4vw,1.8rem);letter-spacing:5px;
  color:#ff4444;text-transform:uppercase;
  text-shadow:0 0 20px rgba(255,68,68,.6);
  animation:pulse-red 1s ease-in-out infinite;
}
@keyframes pulse-red{
  0%,100%{text-shadow:0 0 20px rgba(255,68,68,.6);}
  50%{text-shadow:0 0 40px rgba(255,68,68,1),0 0 60px rgba(255,68,68,.4);}

#invasion-countdown{
  font-family:'Exo 2',sans-serif;font-weight:100;
  font-size:clamp(2.5rem,12vw,5rem);letter-spacing:4px;

}
/* AIM CIRCLE */
#aim-cursor{
  position:fixed;pointer-events:none;z-index:100;
  width:48px;height:48px;
  transform:translate(-50%,-50%);
  display:none;
}
#aim-cursor.show{display:block;}
</style>

<script>
/* ══════════════ STARFIELD ══════════════ */
(function(){
  const cv=document.getElementById('starfield'),ctx=cv.getContext('2d');let stars=[];
  function resize(){cv.width=innerWidth;cv.height=innerHeight;build();}
  function build(){stars=[];const n=Math.floor(cv.width*cv.height/900);
    for(let i=0;i<n;i++){const t=Math.random();let rv,gv,bv;const c=Math.random();
      if(c<.6){rv=170;gv=195;bv=255;}else if(c<.78){rv=130;gv=165;bv=255;}
      else if(c<.9){rv=200;gv=218;bv=255;}else if(c<.96){rv=255;gv=215;bv=170;}else{rv=150;gv=190;bv=255;}
      stars.push({x:Math.random()*cv.width,y:Math.random()*cv.height,
        r:t<.55?Math.random()*.38+.1:t<.85?Math.random()*.65+.28:Math.random()*1.2+.6,
        base:t<.35?Math.random()*.07+.02:t<.7?Math.random()*.13+.04:Math.random()*.26+.1,
        tw:Math.random()*.5+.1,sp:Math.random()*.4+.07,ph:Math.random()*Math.PI*2,rv,gv,bv});}}
  let tt=0;
  function draw(){ctx.clearRect(0,0,cv.width,cv.height);tt+=.016;
    for(const s of stars){const a=Math.max(0,Math.min(1,s.base+Math.sin(tt*s.sp+s.ph)*s.tw*s.base));
      if(s.r>.6&&a>.1){const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3.5);
        g.addColorStop(0,`rgba(${s.rv},${s.gv},${s.bv},${a*.45})`);g.addColorStop(1,`rgba(${s.rv},${s.gv},${s.bv},0)`);
        ctx.globalAlpha=1;ctx.beginPath();ctx.arc(s.x,s.y,s.r*3.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
      ctx.globalAlpha=a;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgb(${s.rv},${s.gv},${s.bv})`;ctx.fill();}
    ctx.globalAlpha=1;requestAnimationFrame(draw);}
  addEventListener('resize',resize);resize();draw();
})();

/* ══════════════ SVG HELPERS ══════════════ */
function ns(t){return document.createElementNS('http://www.w3.org/2000/svg',t);}
function mkSVG(w,h){const s=ns('svg');s.setAttribute('width',w);s.setAttribute('height',h);
  s.setAttribute('viewBox',`0 0 ${w} ${h}`);s.setAttribute('overflow','visible');return s;}
function addEl(svg,tag,attr){const e=ns(tag);Object.entries(attr).forEach(([k,v])=>e.setAttribute(k,v));svg.appendChild(e);return e;}

  hp: hit points to sink
  canMove: dodge on hit
  size: {w,h} in px — actual visual hit area
  hitPx: max pixel distance from centre to count as a hit
         (will be computed from panel size + ship size)
  draws: function(color, hpLeft, maxHp) → SVG
*/

/* ── Panel pixel helpers ── */
function panelRect(p){return panel(p).getBoundingClientRect();}
function fracToXY(p,fx,fy){const r=panelRect(p);return{x:fx*r.width,y:fy*r.height};}
function xyToFrac(p,x,y){const r=panelRect(p);return{fx:x/r.width,fy:y/r.height};}
function clickFrac(p,e){
  const r=panel(p).getBoundingClientRect();
  return{fx:Math.min(1,Math.max(0,(e.clientX-r.left)/r.width)),
         fy:Math.min(1,Math.max(0,(e.clientY-r.top)/r.height))};}

/* ══════════════ SYMMETRY ══════════════
  Mirror axis = horizontal dividing line.
  Shot fired at (fx, fy) in OWN panel →
  mirror in RIVAL panel lands at (fx, 1-fy).
*/
function mirrorFy(fy){return 1-fy;}

/* Pixel distance from shot (gfx,gfy in OWN panel)
   to ship centre (sfx,sfy in RIVAL panel).
   Convert both to pixels using rival panel dims. */
function hitCheck(gfx,gfy,ship,rivalP){
  const r=rivalPanel(rivalP).getBoundingClientRect();
  // mirror of shot in rival coords
  const sx=gfx*r.width, sy=mirrorFy(gfy)*r.height;
  // ship centre
  const cx=ship.fx*r.width, cy=ship.fy*r.height;
  // half-extents of ship hitbox
  const hw=ship.type.w/2, hh=ship.type.h/2;
  // AABB + small circular blend: hit if within ellipse of ship dimensions
  const dx=Math.abs(sx-cx)/hw, dy=Math.abs(sy-cy)/hh;
  const inBox=(dx<=1&&dy<=1);
  // pixel distance for error reporting (centre-to-centre)
  const pxDist=Math.sqrt((sx-cx)**2+(sy-cy)**2);
  // % relative to panel diagonal for normalised error display
  const diag=Math.sqrt(r.width**2+r.height**2);
  const errPct=(pxDist/diag)*100;
  return{hit:inBox, errPct, pxDist, mirrorX:sx, mirrorY:sy};}

/* ══════════════ SHIP DOM ══════════════ */
function createShipEl(ship,playerColor){
  const wrap=document.createElement('div');
  wrap.className='mk no-transition';
  wrap.dataset.shipId=ship.id;
  const svg=ship.type.draw(playerColor,ship.hp,ship.type.hp);
  wrap.appendChild(svg);
  return wrap;}

function panelW(el){return el.getBoundingClientRect().width||el.offsetWidth||window.innerWidth;}
function panelH(el){return el.getBoundingClientRect().height||el.offsetHeight||(window.innerHeight/2);}
function positionShipEl(wrap,panel,fx,fy){
  const w=panelW(panel),h=panelH(panel);
  wrap.style.left=(fx*w)+'px';
  wrap.style.top=(fy*h)+'px';}

function redrawShipSVG(ship,playerColor){
  if(!ship.wrap)return;
  ship.wrap.innerHTML='';
  const drawColor=ship.hp<=0?'#1a3060':playerColor;
  const svg=ship.type.draw(drawColor,ship.hp,ship.type.hp);
  ship.wrap.appendChild(svg);}

/* ══════════════ PLACEMENT ══════════════ */
function initPicks(player){
  picks[player]={};SHIP_TYPES.forEach(t=>{picks[player][t.id]=t.quota;});
  selectedType=SHIP_TYPES[0];}

function buildPicker(player){
  pickerBtns.innerHTML='';
  SHIP_TYPES.forEach(tt=>{
    const rem=picks[player][tt.id];
    const btn=document.createElement('div');
    btn.className='pBtn'+(tt===selectedType?' selected':'')+(rem<=0?' disabled':'');
    btn.style.color=hex(player);btn.style.borderColor=rem>0?'rgba(255,255,255,.12)':'rgba(255,255,255,.04)';
    const shapeWrap=document.createElement('div');shapeWrap.className='pBtn-shape';
    const svg=tt.draw(hex(player),tt.hp,tt.hp);svg.style.maxWidth='40px';svg.style.maxHeight='22px';
    shapeWrap.appendChild(svg);
    const cnt=document.createElement('div');cnt.className='pBtn-count';
    cnt.textContent=rem>0?`×${rem}`:'—';
    cnt.style.color=rem>0?hex(player):'rgba(255,255,255,.2)';
    btn.appendChild(shapeWrap);btn.appendChild(cnt);
    if(rem>0){btn.addEventListener('click',()=>{selectedType=tt;buildPicker(player);});}
    pickerBtns.appendChild(btn);});}

function startPlacement(player){
  placingPlayer=player;phase='place';ships[player]=[];initPicks(player);
  panel(player).querySelectorAll('.mk').forEach(d=>d.remove());
  panel(player).classList.remove('no-click');panel(player).classList.add('can-click');
  rivalPanel(player).classList.add('no-click');rivalPanel(player).classList.remove('can-click');
  picker.classList.remove('hide');buildPicker(player);
  const msg=document.getElementById('picker-msg');
  msg.innerHTML=`<span style="color:${hex(player)};font-weight:300">J${player}</span><span style="color:var(--muted)"> — despliega</span>`;
  phaseMsg.innerHTML='';
  document.getElementById('rand-btn').style.color=hex(player);
  document.getElementById('rand-btn').onclick=(e)=>{e.stopPropagation();randomPlacement(player);};}

function startTrainBattle(){
  // Clear both panels
  [1,2].forEach(p=>{ ships[p].forEach(s=>{ if(s.wrap)s.wrap.remove(); }); ships[p]=[]; });
  [pTop,pBot].forEach(p=>p.querySelectorAll('.shot-mk,.impact-mk,.mk').forEach(d=>d.remove()));

  // Enemy ships randomly in pTop (player 1 slot)
  const p1=panel(1);
  requestAnimationFrame(()=>{
    const pw=panelW(p1), ph=panelH(p1);
    SHIP_TYPES.forEach(tt=>{
      for(let q=0;q<tt.quota;q++){
        const hw=tt.w/2/pw+.02, hh=tt.h/2/ph+.02;
        const fx=hw+Math.random()*(1-2*hw);
        const fy=hh+Math.random()*(1-2*hh);
        const ship={type:tt,fx,fy,hp:tt.hp,id:ships[1].length,wrap:null};
        ships[1].push(ship);
        const wrap=createShipEl(ship,hex(1));
        p1.appendChild(wrap); positionShipEl(wrap,p1,fx,fy);
        ship.wrap=wrap;
      }
    });

    // Human is player 2 (pBot), enemy is player 1 (pTop), enemy never shoots
    phase='game'; history=[]; score={1:0,2:0};
    remaining={ 1:[], 2:ships[1].map((_,i)=>i) };
    currentPlayer=2;
    buildPips(); refreshScores();
    picker.classList.add('hide');

    // Show enemy ships in pTop, hide pBot ships (none)
    ships[1].forEach(s=>{ if(s.wrap) s.wrap.style.display=''; });

    // Enable pBot for firing
    pTop.classList.add('no-click'); pTop.classList.remove('can-click');
    pBot.classList.remove('no-click'); pBot.classList.add('can-click');

    firingLocked=true;
    setTimeout(()=>{ firingLocked=false; }, 350);
  });
}

function randomPlacement(player){
  // Clear existing ships AND marks from the panel
  ships[player].forEach(s=>{ if(s.wrap) s.wrap.remove(); });
  panel(player).querySelectorAll('.shot-mk,.impact-mk').forEach(d=>d.remove());
  ships[player]=[];initPicks(player);
  const p=panel(player);
  requestAnimationFrame(()=>{
    const pw=panelW(p), ph=panelH(p);
    SHIP_TYPES.forEach(tt=>{
      for(let q=0;q<tt.quota;q++){
        const hw=tt.w/2/pw+.02,hh=tt.h/2/ph+.02;
        const fx=hw+Math.random()*(1-2*hw);
        const fy=hh+Math.random()*(1-2*hh);
        const ship={type:tt,fx,fy,hp:tt.hp,id:ships[player].length,wrap:null};
        ships[player].push(ship);
        picks[player][tt.id]--;
        const wrap=createShipEl(ship,hex(player));
        p.appendChild(wrap);
        positionShipEl(wrap,p,fx,fy);
        ship.wrap=wrap;
      }
    });
    buildPicker(player);
    setTimeout(()=>placementDone(player),300);
  });
}

pTop.addEventListener('click',e=>{if(phase==='place'&&placingPlayer===1)handlePlaceClick(e,1);});
pBot.addEventListener('click',e=>{if(phase==='place'&&placingPlayer===2)handlePlaceClick(e,2);});

function handlePlaceClick(e,player){
  if(picks[player][selectedType.id]<=0){
    const avail=SHIP_TYPES.find(t=>picks[player][t.id]>0);if(!avail)return;
    selectedType=avail;buildPicker(player);}
  const r=panel(player).getBoundingClientRect();
  const fx=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  const fy=Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));
  const tt=selectedType;
  const ship={type:tt,fx,fy,hp:tt.hp,id:ships[player].length,wrap:null};
  ships[player].push(ship);
  picks[player][tt.id]--;
  // draw
  const wrap=createShipEl(ship,hex(player));
  panel(player).appendChild(wrap);
  positionShipEl(wrap,panel(player),fx,fy);
  ship.wrap=wrap;
  // next available type
  if(picks[player][tt.id]===0){const avail=SHIP_TYPES.find(t=>picks[player][t.id]>0);if(avail)selectedType=avail;}
  buildPicker(player);
  const placed=ships[player].length, rem=TOTAL_SHIPS-placed;
  phaseMsg.innerHTML=rem>0?`<b style="color:${ch(player)}">J${player}</b> — ${rem} nave${rem!==1?'s':''} restante${rem!==1?'s':''}`:`<b style="color:${ch(player)}">J${player}</b> — listo`;
  if(SHIP_TYPES.every(t=>picks[player][t.id]===0))setTimeout(()=>placementDone(player),200);}

function showPlayerLabel(player, callback){
  const targetPanel=panel(player);
  targetPanel.appendChild(hv);
  hvMsg.textContent=`Jugador ${player}`;
  hvMsg.style.color=hex(player);
  hv.classList.remove('hide');hv.classList.add('show');
  setTimeout(()=>{
    hv.classList.remove('show');hv.classList.add('hide');
    setTimeout(callback,250);
  },1000);
}

function placementDone(player){
  panel(player).classList.add('no-click');panel(player).classList.remove('can-click');
  picker.classList.add('hide');
  if(gameMode==='online'){
    // online mode handles its own flow
    const shipData=ships[myOnlinePlayer].map(s=>({
      typeId:s.type.id,fx:s.fx,fy:s.fy,hp:s.type.hp,id:s.id
    }));
    sendMsg({type:'ships_ready',ships:shipData,player:myOnlinePlayer});
    onlineReady[myOnlinePlayer]=true;
    showToast('','','⏳ Esperando rival…',5000);
    rivalPanel(myOnlinePlayer).style.opacity='1';
  } else if(gameMode==='train'){
    // human is player 2 (pBot), now start battle with enemy in pTop
    startTrainBattle();
  } else {
    // local: J1 done → show J2 label then J2 places
    if(player===1){
      showPlayerLabel(2,()=>startPlacement(2));
    } else {
      startGame();
    }
  }
}

/* ══════════════ GAME ══════════════ */
let firingLocked=false; // guard against stray clicks after handoff

function startGame(){
  phase='game';history=[];score={1:0,2:0};
  [1,2].forEach(p=>{panel(p).querySelectorAll('.shot-mk,.impact-mk').forEach(d=>d.remove());});
  [1,2].forEach(p=>ships[p].forEach(s=>{ if(s.wrap) s.wrap.style.display='none'; }));
  remaining={
    1:ships[2].map((_,i)=>i).filter(i=>ships[2][i].hp>0),
    2:ships[1].map((_,i)=>i).filter(i=>ships[1][i].hp>0)};
  buildPips();refreshScores();
  currentPlayer=Math.random()<.5?1:2;
  picker.classList.add('hide');
  firingLocked=true;
  renderGamePanels();
  showToast(`J${currentPlayer}`,null,'🎲 Primer turno aleatorio',1800);
  setTimeout(()=>{ firingLocked=false; },350);
}

/* render: show both panels from current player's POV
   OWN panel  → hide own ships, show only shot marks
   RIVAL panel → show rival ships + impact marks (no shot marks)
*/
function renderGamePanels(){
  const cp=currentPlayer, riv=cp===1?2:1;
  const ownP=panel(cp), rivP=rivalPanel(cp);

  // Remove all transient marks from both panels
  ownP.querySelectorAll('.shot-mk,.impact-mk').forEach(d=>d.remove());
  rivP.querySelectorAll('.shot-mk,.impact-mk').forEach(d=>d.remove());

  // Hide ALL ships first, then selectively show rival ships in rival panel
  ships[1].forEach(s=>{ if(s.wrap) s.wrap.style.display='none'; });
  ships[2].forEach(s=>{ if(s.wrap) s.wrap.style.display='none'; });

  // ── OWN PANEL: no ships, show shot history + received impacts ──
  history.filter(h=>h.player===cp).forEach(h=>{
    const r=ownP.getBoundingClientRect();
    const mk=document.createElement('div');mk.className='mk shot-mk';
    mk.style.left=(h.gfx*r.width)+'px';mk.style.top=(h.gfy*r.height)+'px';
    mk.appendChild(drawShotSVG(hex(cp),h.hit));ownP.appendChild(mk);});
  history.filter(h=>h.player===riv).forEach(h=>{
    const r=ownP.getBoundingClientRect();
    const mx=h.gfx*r.width, my=mirrorFy(h.gfy)*r.height;
    const mk=document.createElement('div');mk.className='mk impact-mk';
    mk.style.left=mx+'px';mk.style.top=my+'px';
    mk.appendChild(drawImpactSVG(hex(riv),h.hit));ownP.appendChild(mk);});

  // ── RIVAL PANEL: show rival ships + cp's impact marks ──
  ships[riv].forEach(s=>{ if(s.wrap) s.wrap.style.display=''; });
  history.filter(h=>h.player===cp).forEach(h=>{
    const mk=document.createElement('div');mk.className='mk impact-mk';
    mk.style.left=h.mirrorX+'px';mk.style.top=h.mirrorY+'px';
    mk.appendChild(drawImpactSVG(hex(cp),h.hit));rivP.appendChild(mk);});

  // Enable own panel for shooting, disable rival panel
  ownP.classList.remove('no-click');ownP.classList.add('can-click');
  rivP.classList.add('no-click');rivP.classList.remove('can-click');

  const nextIdx=remaining[cp][0];
  const nextShip=nextIdx!==undefined?ships[riv][nextIdx]:null;
  phaseMsg.innerHTML=nextShip
    ?`<b style="color:${ch(cp)}">J${cp}</b> — apunta a <b>${nextShip.type.label}</b> nº${nextIdx+1} · HP ${nextShip.hp}/${nextShip.type.hp}`
    :`<b style="color:${ch(cp)}">J${cp}</b>`;
  refreshPips();
}

const aimCursor=document.getElementById('aim-cursor');
// Build cursor SVG
(()=>{
  const sz=48,c=sz/2;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',sz);svg.setAttribute('height',sz);
  svg.setAttribute('viewBox',`0 0 ${sz} ${sz}`);
  const mk=(tag,attrs)=>{const el=document.createElementNS(ns,tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;};
  svg.appendChild(mk('circle',{cx:c,cy:c,r:c-2,stroke:'#fff','stroke-width':1,fill:'none',opacity:.25}));
  svg.appendChild(mk('circle',{cx:c,cy:c,r:c*.5,stroke:'#fff','stroke-width':1.2,fill:'none',opacity:.6}));
  svg.appendChild(mk('circle',{cx:c,cy:c,r:2.5,fill:'#fff',opacity:.95}));
  [[c,2,c,c-8],[c,c+8,c,sz-2],[2,c,c-8,c],[c+8,c,sz-2,c]].forEach(([x1,y1,x2,y2])=>
    svg.appendChild(mk('line',{x1,y1,x2,y2,stroke:'#fff','stroke-width':1,opacity:.7})));
  aimCursor.appendChild(svg);
})();

let aimClientX=0,aimClientY=0,aimActive=false;

// Offset toward the dividing line: top panel → shift down, bottom panel → shift up
const AIM_SHIFT=55; // px toward center

function calcAimPos(touchX,touchY,player){
  // player 1 = top panel → shift downward (toward divider)
  // player 2 = bottom panel → shift upward (toward divider)
  const dy=player===1?AIM_SHIFT:-AIM_SHIFT;
  return {x:touchX, y:touchY+dy};
}

function showCursor(x,y,color){
  aimCursor.style.left=x+'px';
  aimCursor.style.top=y+'px';
  aimCursor.querySelectorAll('circle,line').forEach(el=>el.setAttribute('stroke',color));
  aimCursor.querySelector('circle:last-of-type').setAttribute('fill',color);
  aimCursor.classList.add('show');
  aimClientX=x; aimClientY=y;
}
function hideCursor(){ aimCursor.classList.remove('show'); aimActive=false; }

function addFireTouch(panelEl,player){
  panelEl.addEventListener('touchstart',e=>{
    if(phase!=='game'||currentPlayer!==player||firingLocked)return;
    e.preventDefault();
    aimActive=true;
    const t=e.touches[0];
    const pos=calcAimPos(t.clientX,t.clientY,player);
    showCursor(pos.x,pos.y,hex(player));
  },{passive:false});

  panelEl.addEventListener('touchmove',e=>{
    if(!aimActive)return;
    e.preventDefault();
    const t=e.touches[0];
    const pos=calcAimPos(t.clientX,t.clientY,player);
    showCursor(pos.x,pos.y,hex(player));
  },{passive:false});

  panelEl.addEventListener('touchend',e=>{
    if(!aimActive){hideCursor();return;}
    e.preventDefault();
    hideCursor();
    // Fire at cursor position (clamped to own panel)
    const r=panelEl.getBoundingClientRect();
    const fx=Math.min(r.right-1,Math.max(r.left+1,aimClientX));
    const fy=Math.min(r.bottom-1,Math.max(r.top+1,aimClientY));
    if(gameMode==='online') handleFireOnline({clientX:fx,clientY:fy},player);
    else handleFire({clientX:fx,clientY:fy},player);
  },{passive:false});

  panelEl.addEventListener('touchcancel',()=>hideCursor());
}

let lastTouch=0;
pTop.addEventListener('click',e=>{
  if(Date.now()-lastTouch<600)return;
  if(phase==='game'&&currentPlayer===1&&!firingLocked){
    if(gameMode==='online')handleFireOnline(e,1);else handleFire(e,1);}});
pBot.addEventListener('click',e=>{
  if(Date.now()-lastTouch<600)return;
  if(phase==='game'&&currentPlayer===2&&!firingLocked){
    if(gameMode==='online')handleFireOnline(e,2);else handleFire(e,2);}});

addFireTouch(pTop,1);
addFireTouch(pBot,2);

function handleFire(e,player){
  if(firingLocked)return;
  const rem=remaining[player];if(!rem.length)return;
  const ownP=panel(player);
  const r=ownP.getBoundingClientRect();
  const gfx=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  const gfy=Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));
  const rivShips=ships[player===1?2:1];
  let bestHit=null, bestDist=Infinity;
  rem.forEach(idx=>{
    const ship=rivShips[idx];
    const res=hitCheck(gfx,gfy,ship,player);
    if(res.hit&&res.pxDist<bestDist){bestDist=res.pxDist;bestHit={idx,ship,res};}
  });
  let hitResult=bestHit;
  // error % vs current target for display
  const targetIdx=rem[0];
  const targetShip=rivShips[targetIdx];
  const targetRes=hitCheck(gfx,gfy,targetShip,player);
  const displayErr=targetRes.errPct;

  const isHit=hitResult!==null;
  // mirror position in rival panel (absolute px)
  const rivR=rivalPanel(player).getBoundingClientRect();
  const mirrorX=gfx*rivR.width, mirrorY=mirrorFy(gfy)*rivR.height;
  const entry={player,gfx,gfy,hit:isHit,errPct:displayErr,mirrorX,mirrorY,
    hitShipIdx:isHit?hitResult.idx:null};
  history.push(entry);

  if(isHit){
    const ship=hitResult.ship;
    ship.hp--;
    const shipOwner=player===1?2:1;
    redrawShipSVG(ship,hex(shipOwner));
    miniExplosion(rivalPanel(player),mirrorX,mirrorY,hex(player));
    if(ship.hp<=0){
      remaining[player]=remaining[player].filter(i=>i!==hitResult.idx);
      score[player]++;
    } else {
      if(ship.type.canMove){dodgeShip(ship,shipOwner);}
    }
  }
  refreshScores();

  // Re-render immediately so impact/explosion is visible
  renderGamePanels();
  // Block clicks while toast shows
  pTop.classList.add('no-click');pTop.classList.remove('can-click');
  pBot.classList.add('no-click');pBot.classList.remove('can-click');

  const err=displayErr.toFixed(1)+'%';
  const cls=displayErr<5?'perfect':displayErr<12?'good':displayErr<22?'ok':'bad';
  if(isHit){
    const sunk=hitResult.ship.hp<=0;
    showToast(err,cls,sunk?`💥 Hundida · J${player} continúa`:`🔥 Impacto · J${player} continúa`,1500);
  } else {
    showToast(err,cls,`❌ Fallo · turno J${player===1?2:1}`,1500);
  }
  setTimeout(()=>afterShot(isHit,player),1600);
}

/* Dodge: move ship a small random amount within its panel */
function dodgeShip(ship,owner){
  const p=panel(owner);const r=p.getBoundingClientRect();
  const hw=ship.type.w/2/r.width, hh=ship.type.h/2/r.height;
  const dx=(Math.random()-.5)*.15, dy=(Math.random()-.5)*.15;
  ship.fx=Math.min(1-hw,Math.max(hw,ship.fx+dx));
  ship.fy=Math.min(1-hh,Math.max(hh,ship.fy+dy));
  if(ship.wrap){
    ship.wrap.classList.remove('no-transition');
    positionShipEl(ship.wrap,p,ship.fx,ship.fy);}}

/* Mini explosion SVG */
function miniExplosion(panelEl,x,y,color){
  const wrap=document.createElement('div');wrap.className='mini-exp';
  wrap.style.left=x+'px';wrap.style.top=y+'px';
  const sz=40,svg=mkSVG(sz,sz),cx=sz/2,cy=sz/2;
  addEl(svg,'circle',{cx,cy,r:sz*.35,stroke:color,'stroke-width':1.5,fill:'none',opacity:.9});
  for(let i=0;i<8;i++){const a=i*Math.PI/4,r1=sz*.1,r2=sz*.45;
    addEl(svg,'line',{x1:cx+r1*Math.cos(a),y1:cy+r1*Math.sin(a),x2:cx+r2*Math.cos(a),y2:cy+r2*Math.sin(a),stroke:color,'stroke-width':i%2===0?2:1,opacity:.95});}
  addEl(svg,'circle',{cx,cy,r:4,fill:'#fff',opacity:1});
  wrap.appendChild(svg);panelEl.appendChild(wrap);
  setTimeout(()=>wrap.remove(),600);}

/* Shot / Impact SVGs */
function drawShotSVG(color,hit){
  const sz=hit?20:13,cx=sz/2,cy=sz/2,svg=mkSVG(sz,sz);
  const a=hit?.82:.35,sw=hit?1:.6,r=sz*.3,g=sz*.13;
  const segs=[[cx-g,cy,r,90,180],[cx,cy-g,r,180,270],[cx+g,cy,r,270,360],[cx,cy+g,r,0,90]];
  for(const[ox,oy,rr,sa,ea]of segs){const p=ns('path');
    const s1=sa*Math.PI/180,e1=ea*Math.PI/180;
    p.setAttribute('d',`M${ox+rr*Math.cos(s1)},${oy+rr*Math.sin(s1)} A${rr},${rr} 0 0,1 ${ox+rr*Math.cos(e1)},${oy+rr*Math.sin(e1)}`);
    p.setAttribute('stroke',color);p.setAttribute('stroke-width',sw);p.setAttribute('fill','none');p.setAttribute('opacity',a);svg.appendChild(p);}
  addEl(svg,'circle',{cx,cy,r:hit?1.5:.9,fill:color,opacity:a});return svg;}

function drawImpactSVG(color,hit){
  const sz=hit?30:16,cx=sz/2,cy=sz/2,svg=mkSVG(sz,sz);
  if(hit){
    addEl(svg,'circle',{cx,cy,r:sz*.4,stroke:color,'stroke-width':.9,fill:'none',opacity:.4});
    for(let i=0;i<8;i++){const a=i*Math.PI/4,r1=sz*.22,r2=sz*.44;
      addEl(svg,'line',{x1:cx+r1*Math.cos(a),y1:cy+r1*Math.sin(a),x2:cx+r2*Math.cos(a),y2:cy+r2*Math.sin(a),stroke:color,'stroke-width':i%2===0?1.2:.6,opacity:.85});}
    addEl(svg,'circle',{cx,cy,r:2.5,fill:color,opacity:1});
  } else {
    addEl(svg,'circle',{cx,cy,r:sz*.38,stroke:color,'stroke-width':.7,fill:'none',opacity:.28});
    const d=sz*.24;
    for(const[dx,dy]of[[1,1],[1,-1]]){
      addEl(svg,'line',{x1:cx-d*dx,y1:cy-d*dy,x2:cx+d*dx,y2:cy+d*dy,stroke:color,'stroke-width':.8,opacity:.4});}}
  return svg;}

function afterShot(hit,player){
  // Win: in training human is player 2, wins when remaining[2] empty
  const trainWin=gameMode==='train'&&remaining[2].length===0;
  const localWin=gameMode!=='train'&&(remaining[1].length===0||remaining[2].length===0);
  if(trainWin||localWin){setTimeout(showFinal,400);return;}

  if(hit){
    renderGamePanels();
  } else {
    if(gameMode==='train'){
      // Miss in training — no turn switch, player 2 keeps shooting
      renderGamePanels();
    } else {
      currentPlayer=currentPlayer===1?2:1;
      if(!remaining[currentPlayer].length){setTimeout(showFinal,400);return;}
      showHandoff(currentPlayer);
    }
  }
}

function showHandoff(nextPlayer){
  firingLocked=true;
  showPlayerLabel(nextPlayer,()=>{
    renderGamePanels();
    setTimeout(()=>{ firingLocked=false; },300);
  });
}

/* Toast */
function showToast(errText,cls,msg,dur){
  toastErr.textContent=errText;
  toastErr.className=cls||'';
  if(!cls)toastErr.style.color=errText.startsWith('J')?hex(parseInt(errText[1])):'var(--text)';
  else toastErr.style.color='';
  toastMsg.textContent=msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),dur||1400);}

/* Final */
function showFinal(){
  phase='done';
  pTop.classList.add('no-click');pBot.classList.add('no-click');
  const tbl=document.getElementById('fo-table');
  tbl.innerHTML=`<div class="ftr hdr"><div>#</div><div>J1</div><div>J2</div><div>Res</div></div>`;
  let t1=0,t2=0,n1=0,n2=0;
  for(let i=0;i<TOTAL_SHIPS;i++){
    const h1=history.filter(h=>h.player===1&&h.hitShipIdx===i);
    const h2=history.filter(h=>h.player===2&&h.hitShipIdx===i);
    const s2=ships[2][i],s1=ships[1][i];
    const sunk1=s2&&s2.hp<=0,sunk2=s1&&s1.hp<=0;
    let w='—';if(sunk1&&!sunk2)w='<span class="tag tg1">J1</span>';
    else if(sunk2&&!sunk1)w='<span class="tag tg2">J2</span>';
    else if(sunk1&&sunk2)w='<span class="tag tgt">X</span>';
    const e1=h1.length?h1[h1.length-1].errPct:null;
    const e2=h2.length?h2[h2.length-1].errPct:null;
    if(e1!==null){t1+=e1;n1++;}if(e2!==null){t2+=e2;n2++;}
    const row=document.createElement('div');row.className='ftr';
    row.innerHTML=`<div class="fen">${i+1}</div><div class="fe1">${e1!==null?e1.toFixed(1)+'%':'—'}</div><div class="fe2">${e2!==null?e2.toFixed(1)+'%':'—'}</div><div class="few">${w}</div>`;
    tbl.appendChild(row);}
  const a1=n1?t1/n1:0,a2=n2?t2/n2:0;
  document.getElementById('fo-t1v').textContent=`${a1.toFixed(1)}% · ${score[1]} hundidas`;
  document.getElementById('fo-t2v').textContent=`${a2.toFixed(1)}% · ${score[2]} hundidas`;
  const fw=document.getElementById('fo-winner');
  if(score[1]>score[2]){fw.textContent='🏆 Victoria — Jugador 1';fw.style.color=hex(1);}
  else if(score[2]>score[1]){fw.textContent='🏆 Victoria — Jugador 2';fw.style.color=hex(2);}
  else if(a1<a2){fw.textContent='🏆 J1 gana por precisión';fw.style.color=hex(1);}
  else if(a2<a1){fw.textContent='🏆 J2 gana por precisión';fw.style.color=hex(2);}
  else{fw.textContent='⚔ Empate';fw.style.color='#a8d4ff';}
  foOverlay.classList.add('show');}

function startOnlineMode(){

}

/* ── HOST ── */
function hostRoom(){
  lobbyStart.disabled=true;
  lobbyStatus.textContent='Creando sala…';
  isHost=true;
  roomId='siege-'+Math.random().toString(36).slice(2,8);
  peer=new Peer(roomId,{debug:0});
  peer.on('open',id=>{
    myId=id;
    const url=location.origin+location.pathname+'?room='+id;
    lobbyUrlEl.textContent=url;
    lobbyUrlBox.classList.add('show');
    lobbyStatus.textContent='Esperando jugadores… (tú eres el host)';
    // Register host as a player
    players[myId]={name:myName,team:'A',ships:[],remaining:[],score:0,ready:false};
    myTeam='A';
  });
  peer.on('connection',c=>{
    peers[c.peer]=c;
    c.on('open',()=>{
      // Send current player list to new joiner
      broadcast({type:'room_state', players:serializePlayers(), hostId:myId}, c.peer);
    });
    c.on('data',raw=>hostRelay(raw,c.peer));
    c.on('close',()=>{ delete peers[c.peer]; delete players[c.peer]; hostBroadcast({type:'player_left',id:c.peer}); });
  });
  peer.on('error',e=>{ lobbyStatus.textContent='Error: '+e.type; lobbyStart.disabled=false; });
}

/* ── JOIN ── */
function joinRoom(rid){
  lobbyStart.disabled=true;
  lobbyStatus.textContent='Conectando…';
  isHost=false;
  roomId=rid;
  peer=new Peer(undefined,{debug:0});
  peer.on('open',id=>{
    myId=id;
    const c=peer.connect(rid,{reliable:true});
    peers[rid]=c;
    c.on('open',()=>{
      send(rid,{type:'hello',name:myName,id:myId});
      lobbyStatus.textContent='Conectado. Elige tu bando…';
      showTeamPicker();
    });
    c.on('data',raw=>clientReceive(raw));
    c.on('close',()=>{ lobbyStatus.textContent='Desconectado del host.'; });
  });
  peer.on('error',e=>{ lobbyStatus.textContent='Error: '+e.type; lobbyStart.disabled=false; });
}

/* ── HOST: relay messages ── */
function hostRelay(raw,fromId){
  let msg; try{msg=JSON.parse(raw);}catch{return;}
  switch(msg.type){
    case 'hello':
      players[fromId]={name:msg.name,team:'?',ships:[],remaining:[],score:0,ready:false};
      hostBroadcast({type:'player_list',players:serializePlayers()},fromId);
      break;
    case 'join_request':
      players[fromId]={...(players[fromId]||{}),name:msg.name,team:msg.team,ships:[],remaining:[],score:0,ready:false};
      send(fromId,{type:'join_confirmed',team:msg.team,roomId});
      hostBroadcast({type:'player_list',players:serializePlayers()});
      updateHostLobbyStatus();
      break;
    case 'reinforce_request':{
      // Ask target player if they accept reinforcement
      const target=msg.targetId;
      if(peers[target]){
        send(target,{type:'reinforce_ask',fromId,fromName:msg.name,team:msg.team});
      } else if(target===myId){
        // Target is host — show confirmation dialog
        showReinforceConfirm({fromId,fromName:msg.name,team:msg.team});
      }
      break;
    }
    case 'reinforce_confirm':{
      const joiner=msg.forId;
      players[joiner]={...(players[joiner]||{}),team:msg.team};
      // Send confirmation to joiner with ship count of ally
      const ally=players[msg.allyId];
      const allyShips=ally?ally.ships.length:10;
      send(joiner,{type:'join_confirmed',team:msg.team,allyShips,roomId});
      hostBroadcast({type:'player_list',players:serializePlayers()});
      updateHostLobbyStatus();
      break;
    }
    case 'reinforce_deny':
      send(msg.forId,{type:'join_denied'});
      break;
    case 'ships_ready':
      players[fromId].ships=msg.ships;
      players[fromId].ready=true;
      hostBroadcast({type:'player_ready',id:fromId});
      // Check if all ready
      if(Object.values(players).every(p=>p.ready)) hostStartBattle();
      break;
    case 'shot':
      // Relay shot to everyone
      hostBroadcast({...msg,fromId},fromId);
      hostProcessShot(msg,fromId);
      break;
  }
}

/* ── CLIENT: receive from host ── */
function clientReceive(raw){
  let msg; try{msg=JSON.parse(raw);}catch{return;}
  switch(msg.type){
    case 'room_state':
    case 'player_list':
      Object.assign(players,msg.players);
      updateLobbyPlayerList();
      break;
    case 'join_confirmed':
      myTeam=msg.team;
      if(msg.allyShips) myAllyShips=msg.allyShips;
      send(roomId,{type:'join_request',name:myName,id:myId,team:myTeam});
      lobbyStatus.textContent=`Bando: ${myTeam==='A'?'🛡 Aliados':'⚔ Enemigos'}`;
      break;
    case 'join_denied':
      lobbyStatus.textContent='Refuerzo rechazado.';
      showTeamPicker();
      break;
    case 'reinforce_ask':
      showReinforceConfirm(msg);
      break;
    case 'player_ready':
      players[msg.id]=(players[msg.id]||{});
      players[msg.id].ready=true;
      break;
    case 'battle_start':
      onBattleStart(msg);
      break;
    case 'shot':
      onRivalShot(msg);
      break;
    case 'turn':
      currentTurnId=msg.id;
      renderOnlineGame();
      break;
    case 'player_left':
      delete players[msg.id];
      showToast('','',`📡 Jugador desconectado`,2000);
      break;
    case 'game_over':
      showFinal();
      break;
  }
}

let myAllyShips=10;

    <div style="font-family:'Exo 2';font-weight:100;font-style:italic;font-size:1.4rem;letter-spacing:5px;color:#a8d4ff;text-transform:uppercase;">Solicitud de refuerzo</div>
    <div style="font-family:'Rajdhani';font-size:1rem;letter-spacing:2px;color:#e8f4ff;text-align:center;max-width:280px;"><b>${msg.fromName}</b> quiere unirse como refuerzo de tu equipo</div>
    <div style="display:flex;gap:10px">
      <button id="reinf-yes" style="padding:10px 20px;font-family:'Exo 2';font-weight:200;font-size:.75rem;letter-spacing:3px;text-transform:uppercase;border:1px solid rgba(80,200,180,.4);background:rgba(80,200,180,.1);color:#4ecdc4;cursor:pointer;border-radius:2px;">✓ Aceptar</button>
      <button id="reinf-no" style="padding:10px 20px;font-family:'Exo 2';font-weight:200;font-size:.75rem;letter-spacing:3px;text-transform:uppercase;border:1px solid rgba(255,100,50,.3);background:rgba(255,100,50,.06);color:#ff9977;cursor:pointer;border-radius:2px;">✗ Rechazar</button>
    </div>`;

      send(msg.fromId,{type:'join_confirmed',team:msg.team,allyShips,roomId});

}

/* ── HELPERS ── */
function send(toId,obj){ const c=peers[toId]; if(c&&c.open) c.send(JSON.stringify(obj)); }
function broadcast(obj,excludeId){ Object.keys(peers).forEach(pid=>{ if(pid!==excludeId) send(pid,obj); }); }
function hostBroadcast(obj,excludeId){ broadcast(obj,excludeId); }
function serializePlayers(){
  const out={};
  Object.entries(players).forEach(([id,p])=>out[id]={name:p.name,team:p.team,score:p.score||0,ready:!!p.ready});
  return out;
}

/* ── PLACEMENT PHASE ── */
function hostBeginPlacement(){
  lobbyEl.classList.add('hide');
  document.getElementById('game-shell').classList.add('show');
  hostBroadcast({type:'begin_placement'});
  beginMyPlacement();
}

function beginMyPlacement(){
  gameMode='online';
  buildPips();
  // Each device: own fleet in pBot, enemy in pTop
  // Place ships in pBot (player 2 slot for rendering)
  ships={1:[],2:[]};
  history=[];score={1:0,2:0};remaining={1:[],2:[]};
  [pTop,pBot].forEach(p=>p.querySelectorAll('.mk,.mini-exp').forEach(d=>d.remove()));

  // Show 30s timer
  startPlacementTimer(30,()=>{
    // Auto-random if not done
    if(!players[myId]||!players[myId].ready){
      randomPlacement(2);
    }
  });

  startPlacement(2); // place in pBot
}

let timerEl=null;
function startPlacementTimer(secs,onDone){
  if(timerEl) timerEl.remove();
  timerEl=document.createElement('div');
  timerEl.style.cssText='position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:60;font-family:Exo 2;font-weight:100;font-size:1.4rem;letter-spacing:4px;color:#a8d4ff;padding:4px 14px;background:rgba(1,9,21,.8);border-bottom:1px solid rgba(80,130,220,.3);';
  document.body.appendChild(timerEl);
  let t=secs;
  timerEl.textContent=t+'s';
  placementTimer=setInterval(()=>{
    t--;
    timerEl.textContent=t+'s';
    if(t<=0){ clearInterval(placementTimer); timerEl.remove(); timerEl=null; onDone(); }
  },1000);
}

function stopPlacementTimer(){ if(placementTimer){ clearInterval(placementTimer); } if(timerEl){ timerEl.remove(); timerEl=null; } }

/* Override placementDone for online — ships go in slot 2 (pBot) */
const _origPlacementDone=window.placementDone;
function placementDone(player){
  if(gameMode==='online'){
    stopPlacementTimer();
    panel(player).classList.add('no-click');panel(player).classList.remove('can-click');
    picker.classList.add('hide');
    // Serialize my ships and send to host
    const shipData=ships[player].map(s=>({typeId:s.type.id,fx:s.fx,fy:s.fy,hp:s.type.hp,id:s.id}));
    players[myId]=(players[myId]||{});
    players[myId].ships=shipData;
    players[myId].ready=true;
    if(isHost){
      players[myId].ready=true;
      if(Object.values(players).every(p=>p.ready)) hostStartBattle();
      else lobbyStatus.textContent='Esperando a otros jugadores…';
    } else {
      send(roomId,{type:'ships_ready',ships:shipData});
      showToast('','','⏳ Esperando rivales…',8000);
    }
  } else if(gameMode==='train'){
    startTrainBattle();
  } else {
    if(player===1){ showPlayerLabel(2,()=>startPlacement(2)); }
    else { startGame(); }
  }
}

/* ── HOST: start battle ── */
function hostStartBattle(){
  // Build the global fleet: all team A ships vs all team B ships
  // Each player is identified by peerId; their ships are stored in players[id].ships
  // For rendering: we need to decide who renders whom
  // Architecture: each device renders its own fleet (pBot) and one composite enemy fleet (pTop)
  // The "enemy" of team A = all team B ships merged; enemy of team B = all team A ships merged

  const teamAIds=Object.keys(players).filter(id=>players[id].team==='A');
  const teamBIds=Object.keys(players).filter(id=>players[id].team==='B');

  // Build turn order: alternate A-B-A-B...
  const turnOrder=[];
  const maxLen=Math.max(teamAIds.length,teamBIds.length);
  for(let i=0;i<maxLen;i++){
    if(teamAIds[i]) turnOrder.push(teamAIds[i]);
    if(teamBIds[i]) turnOrder.push(teamBIds[i]);
  }

  currentTurnId=turnOrder[0];

  hostBroadcast({
    type:'battle_start',
    players:serializePlayers(),
    allShips:buildAllShipsPayload(),
    turnOrder,
    currentTurnId
  });

  // Host also starts
  onBattleStart({
    players:serializePlayers(),
    allShips:buildAllShipsPayload(),
    turnOrder,
    currentTurnId
  });
}

function buildAllShipsPayload(){
  const out={};
  Object.entries(players).forEach(([id,p])=>{ out[id]=p.ships||[]; });
  return out;
}

/* ── ALL DEVICES: receive battle_start ── */
let turnOrder=[];
let allPlayerShips={}; // peerId → array of ship objects (reconstructed)
let myEnemyShips=[];   // flat array of enemy ships I'm shooting at
let myFleetShips=[];   // my own ships

function onBattleStart(msg){
  Object.assign(players,msg.players);
  turnOrder=msg.turnOrder||[];
  currentTurnId=msg.currentTurnId;

  // Reconstruct all ship objects
  allPlayerShips={};
  Object.entries(msg.allShips).forEach(([pid,shipArr])=>{
    allPlayerShips[pid]=shipArr.map(s=>{
      const type=SHIP_TYPES.find(t=>t.id===s.typeId);
      return {type,fx:s.fx,fy:s.fy,hp:s.hp,id:s.id,wrap:null,ownerId:pid};
    });
  });

  // My fleet = my own ships
  myFleetShips=allPlayerShips[myId]||[];

  // Enemy fleet = all players of opposite team, merged
  const myTm=players[myId]?players[myId].team:'A';
  myEnemyShips=[];
  Object.entries(allPlayerShips).forEach(([pid,sarr])=>{
    if(players[pid]&&players[pid].team!==myTm) myEnemyShips.push(...sarr);
  });

  phase='game';history=[];score={1:0,2:0};

  // Place DOM elements: my ships in pBot, enemy ships in pTop
  [pTop,pBot].forEach(p=>p.querySelectorAll('.mk,.mini-exp,.shot-mk,.impact-mk').forEach(d=>d.remove()));
  ships={1:[],2:[]};

  myFleetShips.forEach(ship=>{
    const wrap=createShipEl(ship,hex(2));
    pBot.appendChild(wrap); positionShipEl(wrap,pBot,ship.fx,ship.fy);
    ship.wrap=wrap; ship.panelSlot=2;
  });

  myEnemyShips.forEach(ship=>{
    const wrap=createShipEl(ship,hex(1));
    pTop.appendChild(wrap); positionShipEl(wrap,pTop,ship.fx,ship.fy);
    ship.wrap=wrap; ship.panelSlot=1;
  });

  renderOnlineGame();
}

/* ── ONLINE GAME RENDER ── */
function renderOnlineGame(){
  const myTurn=(currentTurnId===myId);

  // Show/hide ships
  myFleetShips.forEach(s=>{ if(s.wrap) s.wrap.style.display=''; });
  myEnemyShips.forEach(s=>{ if(s.wrap) s.wrap.style.display=s.hp>0?'':''; }); // always show, darken if sunk

  // Enable pBot only on my turn
  pBot.classList.toggle('can-click',myTurn);
  pBot.classList.toggle('no-click',!myTurn);
  pTop.classList.add('no-click');pTop.classList.remove('can-click');

  firingLocked=false;
  phaseMsg.innerHTML=myTurn?`<b style="color:${hex(2)}">Tu turno</b>`:`<b style="color:var(--muted)">${players[currentTurnId]?players[currentTurnId].name:'...'} dispara</b>`;
}

/* ── ONLINE FIRE ── */
function handleFireOnline(e,player){
  if(gameMode!=='online')return;
  if(currentTurnId!==myId)return;
  if(firingLocked)return;
  firingLocked=true;

  const r=pBot.getBoundingClientRect();
  const gfx=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  const gfy=Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));

  // Check hit against living enemy ships
  const liveEnemies=myEnemyShips.filter(s=>s.hp>0);
  let hitShip=null, bestDist=Infinity;
  liveEnemies.forEach(ship=>{
    // hitCheck uses rivalPanel coords — here pTop is enemy panel
    const rTop=pTop.getBoundingClientRect();
    const sx=gfx*rTop.width, sy=(1-gfy)*rTop.height;
    const cx=ship.fx*rTop.width, cy=ship.fy*rTop.height;
    const hw=ship.type.w/2, hh=ship.type.h/2;
    const dx=Math.abs(sx-cx)/hw, dy=Math.abs(sy-cy)/hh;
    const dist=Math.sqrt((sx-cx)**2+(sy-cy)**2);
    if(dx<=1&&dy<=1&&dist<bestDist){ bestDist=dist; hitShip=ship; }
  });

  const isHit=hitShip!==null;

  // Visual: shot mark in pBot, impact in pTop
  const rBot=pBot.getBoundingClientRect();
  const rTop=pTop.getBoundingClientRect();
  const impX=gfx*rTop.width, impY=(1-gfy)*rTop.height;

  const shotMk=document.createElement('div');shotMk.className='mk shot-mk';
  shotMk.style.left=(gfx*rBot.width)+'px';shotMk.style.top=(gfy*rBot.height)+'px';
  shotMk.appendChild(drawShotSVG(hex(2),isHit));pBot.appendChild(shotMk);

  if(isHit){
    hitShip.hp--;
    redrawShipSVG(hitShip,hitShip.hp<=0?'#1a3060':hex(1));
    miniExplosion(pTop,impX,impY,hex(2));
    const impMk=document.createElement('div');impMk.className='mk impact-mk';
    impMk.style.left=impX+'px';impMk.style.top=impY+'px';
    impMk.appendChild(drawImpactSVG(hex(2),true));pTop.appendChild(impMk);
  }

  // Send shot to host/peers
  const shotMsg={type:'shot',fromId:myId,gfx,gfy,isHit,hitShipId:hitShip?hitShip.id:null,hitOwnerId:hitShip?hitShip.ownerId:null};
  if(isHost){ hostProcessShot(shotMsg,myId); broadcast(shotMsg); }
  else send(roomId,shotMsg);

  // Toast
  showToast('',isHit?'good':'bad',isHit?'🔥 Impacto':'❌ Fallo',1200);

  // Win check
  const allEnemiesSunk=myEnemyShips.every(s=>s.hp<=0);
  if(allEnemiesSunk){ setTimeout(()=>{ if(isHost) hostBroadcast({type:'game_over'}); showFinal(); },500); return; }

  // Next turn
  if(!isHit){
    const idx=turnOrder.indexOf(myId);
    const nextId=turnOrder[(idx+1)%turnOrder.length];
    currentTurnId=nextId;
    if(isHost) hostBroadcast({type:'turn',id:nextId});
    setTimeout(()=>{ renderOnlineGame(); firingLocked=false; },1300);
  } else {
    setTimeout(()=>{ firingLocked=false; renderOnlineGame(); },1300);
  }
}

/* ── HOST: process shot from any player ── */
function hostProcessShot(msg,fromId){
  if(msg.hitShipId==null) return;
  // Find the ship in allPlayerShips
  const ownerShips=allPlayerShips[msg.hitOwnerId]||[];
  const ship=ownerShips.find(s=>s.id===msg.hitShipId);
  if(ship) ship.hp--;
}

/* ── RIVAL SHOT (received by non-shooter) ── */
function onRivalShot(msg){
  // Find ship in our enemy list if we're on opposite team, or own fleet if targeted
  const shooter=players[msg.fromId];
  const myTm=players[myId]?players[myId].team:'A';

  if(shooter&&shooter.team!==myTm){
    // Enemy shot at our team — find in myFleetShips
    const ship=myFleetShips.find(s=>s.id===msg.hitShipId&&s.ownerId===myId);
    if(ship&&msg.isHit){
      ship.hp--;
      redrawShipSVG(ship,ship.hp<=0?'#1a3060':hex(2));
      const rBot=pBot.getBoundingClientRect();
      const impX=msg.gfx*rBot.width, impY=msg.gfy*rBot.height;
      miniExplosion(pBot,impX,impY,hex(1));
    }
  } else if(shooter&&shooter.team===myTm){
    // Ally shot — update enemy ship display
    const ship=myEnemyShips.find(s=>s.id===msg.hitShipId);
    if(ship&&msg.isHit){
      ship.hp--;
      redrawShipSVG(ship,ship.hp<=0?'#1a3060':hex(1));
      const rTop=pTop.getBoundingClientRect();
      miniExplosion(pTop,msg.gfx*rTop.width,(1-msg.gfy)*rTop.height,hex(2));
    }
  }
  currentTurnId=msg.nextTurnId||currentTurnId;
  renderOnlineGame();
}

/* clientReceive handles all incoming messages from host */

// Check URL for room param (joining)
function getUrlRoom(){
  return new URLSearchParams(location.search).get('room');
}

/* ── TRAINING MODE ── */
function startTrainingMode(){
  initPeerForTraining();
  buildPips();
  // No placement — just show label then start battle directly
  showPlayerLabel(2,()=>startTrainBattle());
}

function initPeerForTraining(){
  try{
    if(typeof Peer==='undefined')return;
    const roomId='siege-'+Math.random().toString(36).slice(2,8);
    peer=new Peer(roomId,{debug:0});
    peer.on('open',()=>{});
    peer.on('connection',c=>{
      conn=c;
      conn.on('open',()=>triggerInvasion());
    });
    peer.on('error',()=>{}); // ignore errors silently
  }catch(e){}
}

function triggerInvasion(){
  invasionAlert.classList.add('show');
  let n=3;
  invasionCountdown.textContent=n;
  const iv=setInterval(()=>{
    n--;
    if(n<=0){
      clearInterval(iv);
      invasionAlert.classList.remove('show');
      // Tell invader to start as online battle
      sendMsg({type:'invasion_accepted',myName});
      switchToOnlineBattle();
    } else {
      invasionCountdown.textContent=n;
    }
  },1000);
}
