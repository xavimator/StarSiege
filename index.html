<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Star Siege</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;1,100;1,200&family=Rajdhani:wght@300;400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#ff6b35;--c2:#4ecdc4;
  --bg:#010915;--surf:#030d1c;--border:#0a1628;
  --text:#e8f4ff;--muted:#5a8fd4;--div:rgba(30,80,160,.4);
}
html,body{height:100%;overflow:hidden;touch-action:none;}
body{
  font-family:'Rajdhani',sans-serif;font-weight:300;
  height:100dvh;display:flex;flex-direction:column;
  background:var(--bg);color:var(--text);user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
}
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none;}
#nebula{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 15% 55%,rgba(8,35,110,.2) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 85% 25%,rgba(5,20,80,.15) 0%,transparent 65%),
    radial-gradient(ellipse 45% 65% at 50% 90%,rgba(6,28,95,.12) 0%,transparent 70%);
}

/* TOPBAR */
#topbar{
  position:relative;z-index:20;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 10px;
  background:linear-gradient(180deg,rgba(3,13,28,.97),rgba(1,9,21,.93));
  border-bottom:1px solid var(--div);gap:6px;backdrop-filter:blur(10px);
  overflow:hidden;min-width:0;
}
#game-title{
  font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;
  font-size:clamp(1rem,3.5vw,1.5rem);letter-spacing:5px;color:#a8d4ff;
  text-transform:uppercase;text-shadow:0 0 20px rgba(80,140,255,.35);white-space:nowrap;
  flex-shrink:0;
}
#phase-msg{
  font-family:'Rajdhani',sans-serif;font-weight:300;
  font-size:clamp(.75rem,2vw,1rem);color:var(--muted);
  letter-spacing:2px;text-align:center;flex:1;text-transform:uppercase;
  overflow:hidden;min-width:0;
}
#phase-msg b{color:var(--text);font-weight:400;}
#scores{display:flex;gap:6px;flex-shrink:0;align-items:center;}
.sb{text-align:center;}
.sb-lbl{font-family:'Exo 2',sans-serif;font-weight:200;font-size:.55rem;letter-spacing:2px;opacity:.4;display:block;}
.sb-val{font-family:'Exo 2',sans-serif;font-weight:100;font-size:clamp(1.2rem,4vw,1.8rem);letter-spacing:2px;}
#sb1 .sb-val{color:var(--c1);text-shadow:0 0 10px var(--c1)44;}
#sb2 .sb-val{color:var(--c2);text-shadow:0 0 10px var(--c2)44;}
#turn-bar{width:3px;height:26px;border-radius:2px;flex-shrink:0;background:var(--muted);transition:background .4s,box-shadow .4s;}
#turn-bar.t1{background:var(--c1);box-shadow:0 0 8px var(--c1)88;}
#turn-bar.t2{background:var(--c2);box-shadow:0 0 8px var(--c2)88;}
#phase-msg{display:none;}
#pips-row{display:none;}
.pg{display:flex;gap:2px;}
.pip{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .2s;}
.pip.sunk{background:#0d1e35;}
.pip.cur1{background:var(--c1);box-shadow:0 0 4px var(--c1)99;}
.pip.cur2{background:var(--c2);box-shadow:0 0 4px var(--c2)99;}

#game-shell{display:none;flex-direction:column;flex:1;overflow:hidden;}
#game-shell.show{display:flex;}
/* ARENA */
#arena{position:relative;z-index:5;display:flex;flex-direction:column;flex:1;overflow:hidden;}
.panel{flex:1;position:relative;overflow:hidden;touch-action:manipulation;}
.panel.can-click{cursor:crosshair;}
.panel.no-click{pointer-events:none;}
#panel-top{border-bottom:1px solid var(--div);background:linear-gradient(180deg,rgba(2,10,26,.28),rgba(1,7,18,.08));}
#panel-bot{background:linear-gradient(0deg,rgba(2,10,26,.28),rgba(1,7,18,.08));}
.ptag{
  position:absolute;top:7px;left:11px;
  font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;
  font-size:clamp(.64rem,1.6vw,.88rem);letter-spacing:5px;
  pointer-events:none;opacity:.08;text-transform:uppercase;
}
.ptag.editable{pointer-events:auto;opacity:.22;cursor:pointer;}
.ptag.editable:active{opacity:.5;}
#panel-top .ptag{color:var(--c1);}
#panel-bot .ptag{color:var(--c2);}

/* Zona de exclusión de colocación */
.panel::before,.panel::after{
  content:'';position:absolute;left:0;right:0;height:20%;
  pointer-events:none !important;z-index:-1;opacity:0;transition:opacity .3s;
  background:repeating-linear-gradient(
    45deg,
    rgba(255,80,80,.07) 0px,rgba(255,80,80,.07) 4px,
    transparent 4px,transparent 10px
  );
}
/* pTop: zona prohibida solo en la parte superior (lejos de la división) */
#panel-top::before{top:0;border-bottom:2px dashed rgba(255,100,80,.35);display:block;}
#panel-top::after{display:none;}
/* pBot: zona prohibida solo en la parte inferior (lejos de la división) */
#panel-bot::before{display:none;}
#panel-bot::after{bottom:0;border-top:2px dashed rgba(255,100,80,.35);display:block;}
.panel.placing::before,.panel.placing::after{opacity:1;}
@keyframes zone-flash{0%,100%{opacity:1;}50%{opacity:.2;}}
.panel.placing.zone-warn::before,.panel.placing.zone-warn::after{animation:zone-flash .25s 2;}

/* NAME EDITOR OVERLAY */
#name-editor{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:center;justify-content:center;
  background:rgba(1,9,21,.82);backdrop-filter:blur(6px);
}
#name-editor.show{display:flex;}
#name-editor-box{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  padding:28px 24px;background:rgba(3,13,28,.97);
  border:1px solid rgba(168,212,255,.15);border-radius:4px;
  min-width:220px;
}
#name-editor-lbl{
  font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;
  font-size:.75rem;letter-spacing:4px;text-transform:uppercase;opacity:.6;
}
#name-editor-inp{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:1.1rem;
  letter-spacing:3px;text-transform:uppercase;
  background:rgba(255,255,255,.04);border:none;
  border-bottom:1px solid currentColor;
  color:currentColor;outline:none;padding:6px 4px;
  width:180px;text-align:center;
}
#name-editor-ok{
  font-family:'Exo 2',sans-serif;font-size:.85rem;letter-spacing:3px;
  padding:7px 22px;background:transparent;cursor:pointer;
  border:1px solid currentColor;color:currentColor;border-radius:2px;
  text-transform:uppercase;
}

/* MARKS */
.mk{position:absolute;pointer-events:none;transform:translate(-50%,-50%);transition:left .6s ease,top .6s ease;}
.mk svg{display:block;}
.mk.no-transition{transition:none;}

/* MINI EXPLOSION */
@keyframes explode{
  0%  {transform:translate(-50%,-50%) scale(.2);opacity:1;}
  60% {transform:translate(-50%,-50%) scale(1.4);opacity:.8;}
  100%{transform:translate(-50%,-50%) scale(2);opacity:0;}
}
.mini-exp{position:absolute;pointer-events:none;transform:translate(-50%,-50%);animation:explode .5s ease-out forwards;}
@keyframes impact-shrink{
  0%  {transform:translate(-50%,-50%) scale(1);}
  30% {transform:translate(-50%,-50%) scale(1.15);}
  100%{transform:translate(-50%,-50%) scale(.53);}
}
.impact-mk.hit-shrink{animation:impact-shrink .7s .4s ease-in-out forwards;}
.impact-mk.hit-shrink.no-delay{animation:none;transform:translate(-50%,-50%) scale(.53);}

/* PICKER */
#picker{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:linear-gradient(0deg,rgba(3,13,28,.98),rgba(3,13,28,.92));
  border-top:1px solid var(--div);padding:6px 10px 8px;
  display:flex;align-items:center;gap:6px;backdrop-filter:blur(12px);
  transform:translateY(0);transition:transform .25s ease;
}
#picker.hide{transform:translateY(100%);}
#picker-msg{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.72rem;
  letter-spacing:2px;text-transform:uppercase;white-space:nowrap;
  flex-shrink:0;line-height:1.3;
}
#picker-btns{display:flex;gap:4px;align-items:center;}
.pBtn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 7px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);
  cursor:pointer;border-radius:2px;transition:border-color .15s,background .15s;
}
.pBtn.selected{background:rgba(255,255,255,.09);}
.pBtn.disabled{opacity:.25;cursor:default;}
.pBtn-shape{display:flex;align-items:center;justify-content:center;height:22px;}
.pBtn-count{font-family:'Exo 2',sans-serif;font-weight:300;font-size:.65rem;letter-spacing:1px;opacity:.9;}
#rand-btn{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.62rem;letter-spacing:2px;
  padding:5px 10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);
  cursor:pointer;border-radius:2px;color:var(--text);text-transform:uppercase;white-space:nowrap;
  flex-shrink:0;transition:background .15s;
}
#rand-btn:hover{background:rgba(255,255,255,.1);}

/* TOAST */
#toast{
  position:fixed;left:50%;bottom:14px;transform:translateX(-50%) translateY(80px);
  z-index:50;pointer-events:none;
  display:flex;align-items:center;gap:10px;padding:6px 14px;
  background:rgba(3,13,28,.93);border:1px solid var(--div);border-radius:3px;
  backdrop-filter:blur(10px);transition:transform .22s ease,opacity .22s ease;opacity:0;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#toast-err{font-family:'Exo 2',sans-serif;font-weight:100;font-size:clamp(1.8rem,6vw,2.8rem);letter-spacing:3px;}
#toast-err.perfect{color:#e8ff00;text-shadow:0 0 12px #e8ff0077;}
#toast-err.good{color:#7dff7d;text-shadow:0 0 10px #7dff7d55;}
#toast-err.ok{color:#ffcc00;}
#toast-err.bad{color:#ff4444;}
#toast-msg{font-family:'Rajdhani',sans-serif;font-weight:300;font-size:.96rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}

/* HANDOFF LABEL */
#handoff-veil{
  position:absolute;inset:0;z-index:15;
  display:flex;align-items:center;justify-content:center;
  pointer-events:all;opacity:0;transition:opacity .2s;
  background:transparent;
}
#handoff-veil.show{opacity:1;}
#handoff-veil.hide{opacity:0;pointer-events:none;}
#hv-msg{
  font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;
  font-size:clamp(1.2rem,5vw,2rem);letter-spacing:5px;
  text-transform:uppercase;
  color:transparent;
  -webkit-text-stroke:1.5px currentColor;
  text-shadow:none;
  pointer-events:none;
}
#hv-btn{
  position:absolute;inset:0;width:100%;height:100%;
  background:transparent;border:none;cursor:pointer;
  opacity:0;
}

/* FINAL */
#final-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(1,9,21,.97);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:20px;text-align:center;opacity:0;pointer-events:none;transition:opacity .3s;
}
#final-overlay.show{opacity:1;pointer-events:all;}
#fo-title{font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;font-size:clamp(2rem,10vw,3.6rem);letter-spacing:7px;color:#a8d4ff;text-transform:uppercase;text-shadow:0 0 24px rgba(80,140,255,.3);}
#fo-winner{font-family:'Exo 2',sans-serif;font-weight:200;font-style:italic;font-size:clamp(1.6rem,6vw,2.2rem);letter-spacing:4px;text-transform:uppercase;}
#fo-table{display:flex;flex-direction:column;gap:3px;width:100%;max-width:420px;max-height:40vh;overflow-y:auto;}
.ftr{display:grid;grid-template-columns:1.2rem 1fr 1fr .9fr;gap:6px;align-items:center;
  font-family:'Rajdhani',sans-serif;font-weight:300;font-size:.92rem;letter-spacing:1px;text-transform:uppercase;
  padding:3px 8px;background:rgba(3,13,28,.8);border-radius:2px;}
.ftr.hdr{color:var(--muted);font-size:.8rem;background:transparent;}
.fe1{color:var(--c1);font-weight:400;text-align:right;}
.fe2{color:var(--c2);font-weight:400;text-align:right;}
.few{text-align:right;font-size:.8rem;}
.fen{color:var(--muted);}
#fo-totals{display:flex;gap:24px;justify-content:center;}
.fo-tot{text-align:center;}
.fo-tot-lbl{font-family:'Exo 2',sans-serif;font-weight:200;font-size:.72rem;letter-spacing:3px;opacity:.4;display:block;margin-bottom:3px;text-transform:uppercase;}
.fo-tot-val{font-family:'Exo 2',sans-serif;font-weight:100;font-size:clamp(1.7rem,6vw,2.4rem);letter-spacing:2px;}
#fo-t1 .fo-tot-val{color:var(--c1);}
#fo-t2 .fo-tot-val{color:var(--c2);}
.fo-btn{font-family:'Exo 2',sans-serif;font-weight:200;font-size:1.24rem;letter-spacing:4px;padding:9px 24px;border:none;cursor:pointer;text-transform:uppercase;background:rgba(100,160,255,.1);color:#a8d4ff;border:1px solid rgba(80,130,220,.2);transition:transform .1s,background .15s;}
.fo-btn:hover{transform:scale(1.04);background:rgba(100,160,255,.18);}
.tag{font-family:'Exo 2',sans-serif;font-weight:200;font-size:.76rem;letter-spacing:2px;padding:2px 6px;}
.tg1{background:var(--c1);color:#000;}.tg2{background:var(--c2);color:#000;}.tgt{background:#0d1e35;color:var(--text);}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
/* ══════════ LOBBY ══════════ */
#lobby{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:24px 20px;
  background:rgba(1,9,21,.97);backdrop-filter:blur(10px);
}
#lobby.hide{display:none;}
#lobby-title{
  font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;
  font-size:clamp(2rem,8vw,3.2rem);letter-spacing:10px;
  color:#d8eeff;text-transform:uppercase;
  text-shadow:0 0 30px rgba(100,180,255,.7),0 0 60px rgba(60,130,255,.3);
  margin-bottom:4px;
}
.lobby-field{display:flex;flex-direction:column;gap:6px;width:100%;max-width:300px;}
.lobby-lbl{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.72rem;
  letter-spacing:4px;color:#7ab0e8;text-transform:uppercase;
}
.lobby-input{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:1.05rem;
  letter-spacing:2px;padding:9px 13px;
  background:rgba(168,212,255,.05);border:1px solid rgba(100,160,240,.3);
  color:#e8f4ff;outline:none;border-radius:2px;text-align:center;
}
.lobby-input::placeholder{color:rgba(168,212,255,.25);}
.lobby-input:focus{border-color:rgba(168,212,255,.65);background:rgba(168,212,255,.08);}
.lobby-modes{display:flex;gap:8px;width:100%;max-width:300px;}
.mode-btn{
  flex:1;padding:10px 6px;
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.68rem;letter-spacing:2px;
  text-transform:uppercase;border:1px solid rgba(100,160,240,.2);
  background:rgba(255,255,255,.03);color:#7ab0e8;cursor:pointer;
  border-radius:2px;transition:all .15s;
}
.mode-btn.active{
  background:rgba(168,212,255,.12);border-color:rgba(168,212,255,.55);
  color:#d8eeff;text-shadow:0 0 8px rgba(168,212,255,.4);
}
.lobby-btn{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.9rem;letter-spacing:5px;
  padding:12px 28px;border:none;cursor:pointer;text-transform:uppercase;
  transition:transform .1s,opacity .15s,box-shadow .15s;
  width:100%;max-width:300px;border-radius:2px;
}
.lobby-btn:hover{transform:scale(1.02);box-shadow:0 0 20px rgba(168,212,255,.2);}
.lobby-btn:active{transform:scale(.97);}
.lobby-btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none;}
#lobby-status{
  font-family:'Rajdhani',sans-serif;font-weight:300;font-size:.95rem;
  letter-spacing:2px;color:#7ab0e8;text-transform:uppercase;
  text-align:center;min-height:1.2em;
}
#lobby-url-box{
  display:none;flex-direction:column;gap:6px;width:100%;max-width:300px;
}
#lobby-url-box.show{display:flex;}
#lobby-url{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.62rem;
  letter-spacing:1px;padding:7px 10px;word-break:break-all;
  background:rgba(168,212,255,.07);border:1px solid rgba(168,212,255,.2);
  color:#a8d4ff;border-radius:2px;text-align:center;
}
#lobby-copy{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.65rem;
  letter-spacing:3px;padding:6px;border:1px solid rgba(168,212,255,.25);
  background:rgba(168,212,255,.06);color:#a8d4ff;cursor:pointer;
  text-transform:uppercase;border-radius:2px;transition:background .15s;
}
#lobby-copy:hover{background:rgba(168,212,255,.12);}
/* INVASION ALERT */
#invasion-alert{
  position:fixed;inset:0;z-index:180;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;pointer-events:none;opacity:0;
  transition:opacity .4s;
}
#invasion-alert.show{opacity:1;}
#invasion-title{
  font-family:'Exo 2',sans-serif;font-weight:100;font-style:italic;
  font-size:clamp(1.1rem,4vw,1.8rem);letter-spacing:5px;
  color:#ff4444;text-transform:uppercase;
  text-shadow:0 0 20px rgba(255,68,68,.6);
  animation:pulse-red 1s ease-in-out infinite;
}
@keyframes pulse-red{
  0%,100%{text-shadow:0 0 20px rgba(255,68,68,.6);}
  50%{text-shadow:0 0 40px rgba(255,68,68,1),0 0 60px rgba(255,68,68,.4);}
}
#invasion-countdown{
  font-family:'Exo 2',sans-serif;font-weight:100;
  font-size:clamp(2.5rem,12vw,5rem);letter-spacing:4px;
  color:#a8d4ff;
}
/* ROOMS LIST */
#lobby-rooms{display:none;flex-direction:column;gap:6px;width:100%;max-width:300px;}
#lobby-rooms.show{display:flex;}
.room-lbl{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.65rem;
  letter-spacing:4px;text-transform:uppercase;color:#a8d4ff;opacity:.5;
}
.room-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;
  background:rgba(168,212,255,.04);
  border:1px solid rgba(168,212,255,.12);
  border-radius:2px;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.room-item:active{background:rgba(168,212,255,.1);border-color:rgba(168,212,255,.3);}
.room-code{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.9rem;
  letter-spacing:4px;color:#a8d4ff;text-transform:uppercase;
}
.room-info{
  font-family:'Exo 2',sans-serif;font-weight:100;font-size:.6rem;
  letter-spacing:2px;color:#a8d4ff;opacity:.45;
  text-transform:uppercase;
}
.room-empty{
  font-family:'Exo 2',sans-serif;font-weight:100;font-size:.65rem;
  letter-spacing:3px;color:#a8d4ff;opacity:.3;text-transform:uppercase;
  text-align:center;padding:8px 0;
}
#lobby-new-room{
  font-family:'Exo 2',sans-serif;font-weight:200;font-size:.7rem;
  letter-spacing:3px;text-transform:uppercase;
  background:transparent;border:1px solid rgba(168,212,255,.18);
  color:#a8d4ff;padding:7px 14px;cursor:pointer;border-radius:2px;
  opacity:.6;transition:opacity .15s;
}
#lobby-new-room:active{opacity:1;}
#aim-cursor{
  position:fixed;pointer-events:none;z-index:100;
  width:48px;height:48px;
  transform:translate(-50%,-50%);
  display:none;
}
#aim-cursor.show{display:block;}
#ghost-cursor{
  position:fixed;pointer-events:none;z-index:35;
  width:48px;height:48px;
  transform:translate(-50%,-50%);
  display:none;
}
#ghost-cursor.show{display:block;}
@keyframes deployFloat{
  0%{opacity:0;transform:translate(-50%,-40%) scale(.9);}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  80%{opacity:1;transform:translate(-50%,-62%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-74%) scale(1.04);}
}
.deploy-banner{
  position:absolute;left:50%;top:50%;z-index:40;
  pointer-events:none;white-space:nowrap;text-align:center;

<script>
/* ══════════════ STARFIELD ══════════════ */
(function(){
  const cv=document.getElementById('starfield'),ctx=cv.getContext('2d');let stars=[];
  function resize(){cv.width=innerWidth;cv.height=innerHeight;build();}
  function build(){stars=[];const n=Math.floor(cv.width*cv.height/900);
    for(let i=0;i<n;i++){const t=Math.random();let rv,gv,bv;const c=Math.random();
      if(c<.6){rv=170;gv=195;bv=255;}else if(c<.78){rv=130;gv=165;bv=255;}
      else if(c<.9){rv=200;gv=218;bv=255;}else if(c<.96){rv=255;gv=215;bv=170;}else{rv=150;gv=190;bv=255;}
      stars.push({x:Math.random()*cv.width,y:Math.random()*cv.height,
        r:t<.55?Math.random()*.38+.1:t<.85?Math.random()*.65+.28:Math.random()*1.2+.6,
        base:t<.35?Math.random()*.07+.02:t<.7?Math.random()*.13+.04:Math.random()*.26+.1,
        tw:Math.random()*.5+.1,sp:Math.random()*.4+.07,ph:Math.random()*Math.PI*2,rv,gv,bv});}}
  let tt=0;
  function draw(){ctx.clearRect(0,0,cv.width,cv.height);tt+=.016;
    for(const s of stars){const a=Math.max(0,Math.min(1,s.base+Math.sin(tt*s.sp+s.ph)*s.tw*s.base));
      if(s.r>.6&&a>.1){const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3.5);
        g.addColorStop(0,`rgba(${s.rv},${s.gv},${s.bv},${a*.45})`);g.addColorStop(1,`rgba(${s.rv},${s.gv},${s.bv},0)`);
        ctx.globalAlpha=1;ctx.beginPath();ctx.arc(s.x,s.y,s.r*3.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
      ctx.globalAlpha=a;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgb(${s.rv},${s.gv},${s.bv})`;ctx.fill();}
    ctx.globalAlpha=1;requestAnimationFrame(draw);}
  addEventListener('resize',resize);resize();draw();
})();

/* ══════════════ SVG HELPERS ══════════════ */
function ns(t){return document.createElementNS('http://www.w3.org/2000/svg',t);}
function mkSVG(w,h){const s=ns('svg');s.setAttribute('width',w);s.setAttribute('height',h);
  s.setAttribute('viewBox',`0 0 ${w} ${h}`);s.setAttribute('overflow','visible');return s;}
function addEl(svg,tag,attr){const e=ns(tag);Object.entries(attr).forEach(([k,v])=>e.setAttribute(k,v));svg.appendChild(e);return e;}

/* ══════════════ SHIP TYPES ══════════════
  hp: hit points to sink
  canMove: dodge on hit
  size: {w,h} in px — actual visual hit area
  hitPx: max pixel distance from centre to count as a hit
         (will be computed from panel size + ship size)
  draws: function(color, hpLeft, maxHp) → SVG
*/
const SHIP_TYPES = [
  {
    id:'xl', label:'Grande', quota:1, hp:3, canMove:true,
    w:28, h:28,
    draw(color,hp,maxHp){
      const sunk=hp<=0;
      const a=sunk?.18:.4+.6*(hp/maxHp), svg=mkSVG(28,28), cx=14, cy=14;
      addEl(svg,'circle',{cx,cy,r:12,stroke:color,'stroke-width':1.2,fill:'none',opacity:a*.5});
      addEl(svg,'circle',{cx,cy,r:7, stroke:color,'stroke-width':.8,fill:'none',opacity:a*.65});
      addEl(svg,'circle',{cx,cy,r:2.5,fill:color,opacity:a});
      for(let i=0;i<8;i++){const ang=i*Math.PI/4,r1=9,r2=13;
        addEl(svg,'line',{x1:cx+r1*Math.cos(ang),y1:cy+r1*Math.sin(ang),x2:cx+r2*Math.cos(ang),y2:cy+r2*Math.sin(ang),stroke:color,'stroke-width':i%2===0?1:.6,opacity:a*.7});}
      for(let d=0;d<maxHp-hp;d++){const ang=d*(Math.PI*2/3);
        addEl(svg,'line',{x1:cx+4*Math.cos(ang),y1:cy+4*Math.sin(ang),x2:cx+7*Math.cos(ang),y2:cy+7*Math.sin(ang),stroke:'#ff4444','stroke-width':1.5,opacity:.9});}
      return svg;
    }
  },
  {
    id:'md', label:'Mediana', quota:2, hp:2, canMove:true,
    w:18, h:18,
    draw(color,hp,maxHp){
      const sunk=hp<=0;
      const a=sunk?.18:.4+.6*(hp/maxHp), svg=mkSVG(18,18), cx=9, cy=9;
      addEl(svg,'polygon',{points:`${cx},${cy-8} ${cx+8},${cy} ${cx},${cy+8} ${cx-8},${cy}`,stroke:color,'stroke-width':1.1,fill:'none',opacity:a*.7});
      addEl(svg,'circle',{cx,cy,r:2,fill:color,opacity:a});
      for(let d=0;d<maxHp-hp;d++){const ang=d*Math.PI;
        addEl(svg,'line',{x1:cx+2*Math.cos(ang),y1:cy+2*Math.sin(ang),x2:cx+5*Math.cos(ang),y2:cy+5*Math.sin(ang),stroke:'#ff4444','stroke-width':1.4,opacity:.9});}
      return svg;
    }
  },
  {
    id:'lg', label:'Larga', quota:2, hp:2, canMove:false,
    w:32, h:8,
    draw(color,hp,maxHp){
      const sunk=hp<=0;
      const a=sunk?.18:.4+.6*(hp/maxHp), svg=mkSVG(32,8), cx=16, cy=4;
      addEl(svg,'rect',{x:1,y:1,width:30,height:6,stroke:color,'stroke-width':.8,fill:'none',rx:1,opacity:a*.65});
      addEl(svg,'line',{x1:cx,y1:1,x2:cx,y2:7,stroke:color,'stroke-width':.7,opacity:a*.5});
      addEl(svg,'circle',{cx,cy,r:1.5,fill:color,opacity:a});
      for(let d=0;d<maxHp-hp;d++){const x=d===0?9:23;
        addEl(svg,'line',{x1:x,y1:1,x2:x+3,y2:7,stroke:'#ff4444','stroke-width':1.3,opacity:.9});
        addEl(svg,'line',{x1:x+3,y1:1,x2:x,y2:7,stroke:'#ff4444','stroke-width':1.3,opacity:.9});}
      return svg;
    }
  },
  {
    id:'xs', label:'Pequeña', quota:5, hp:1, canMove:false,
    w:8, h:8,
    draw(color,hp,maxHp){
      const a=hp>0?.85:.18, svg=mkSVG(8,8), cx=4, cy=4;
      addEl(svg,'line',{x1:cx-3,y1:cy,x2:cx+3,y2:cy,stroke:color,'stroke-width':.9,opacity:a});
      addEl(svg,'line',{x1:cx,y1:cy-3,x2:cx,y2:cy+3,stroke:color,'stroke-width':.9,opacity:a});
      addEl(svg,'circle',{cx,cy,r:1,fill:color,opacity:a});
      return svg;
    }
  }
];

const TOTAL_SHIPS = SHIP_TYPES.reduce((s,t)=>s+t.quota,0); // 10

/* ══════════════ GAME STATE ══════════════ */
let phase='place', placingPlayer=1;
// ships[player] = [{type, fx, fy, hp, id, wrap(DOM)}]
let ships={1:[],2:[]};
let picks={1:{},2:{}};
let selectedType=SHIP_TYPES[0];
let history=[];
// remaining[player] = indices into ships[rival] not yet sunk
let remaining={1:[],2:[]};
let currentPlayer=1;
let score={1:0,2:0};
let toastTimer=null;

const pTop=document.getElementById('panel-top');
const pBot=document.getElementById('panel-bot');
const phaseMsg=document.getElementById('phase-msg');
const picker=document.getElementById('picker');
const pickerBtns=document.getElementById('picker-btns');
const toastEl=document.getElementById('toast');
const toastErr=document.getElementById('toast-err');
const toastMsg=document.getElementById('toast-msg');
const turnBar=document.getElementById('turn-bar');
const hv=document.getElementById('handoff-veil');
const hvMsg=document.getElementById('hv-msg');
const hvBtn=document.getElementById('hv-btn');
const foOverlay=document.getElementById('final-overlay');

function ch(p){return p===1?'var(--c1)':'var(--c2)';}
function hex(p){return p===1?'#ff6b35':'#4ecdc4';}
function panel(p){return p===1?pTop:pBot;}
function rivalPanel(p){return p===1?pBot:pTop;}

/* ── Pips ── */
function buildPips(){
  document.getElementById('pg1').innerHTML='';document.getElementById('pg2').innerHTML='';
  for(let i=0;i<TOTAL_SHIPS;i++){
    const a=document.createElement('div');a.className='pip';a.id='pip1-'+i;document.getElementById('pg1').appendChild(a);
    const b=document.createElement('div');b.className='pip';b.id='pip2-'+i;document.getElementById('pg2').appendChild(b);}}
function refreshPips(){
  for(let i=0;i<TOTAL_SHIPS;i++){
    const p1=document.getElementById('pip1-'+i);const p2=document.getElementById('pip2-'+i);
    if(!p1||!p2)continue;
    const s1=ships[1][i];p1.className='pip'+(s1&&s1.hp<=0?' sunk':remaining[1].includes(i)&&currentPlayer===1?' cur1':'');
    const s2=ships[2][i];p2.className='pip'+(s2&&s2.hp<=0?' sunk':remaining[2].includes(i)&&currentPlayer===2?' cur2':'');}}
function refreshScores(){
  document.querySelector('#sb1 .sb-val').textContent=score[1];
  document.querySelector('#sb2 .sb-val').textContent=score[2];
  turnBar.className='';turnBar.id='turn-bar';
  if(phase==='game')turnBar.classList.add('t'+currentPlayer);}

/* ── Panel pixel helpers ── */
function panelRect(p){return panel(p).getBoundingClientRect();}
function fracToXY(p,fx,fy){const r=panelRect(p);return{x:fx*r.width,y:fy*r.height};}
function xyToFrac(p,x,y){const r=panelRect(p);return{fx:x/r.width,fy:y/r.height};}
function clickFrac(p,e){
  const r=panel(p).getBoundingClientRect();
  return{fx:Math.min(1,Math.max(0,(e.clientX-r.left)/r.width)),
         fy:Math.min(1,Math.max(0,(e.clientY-r.top)/r.height))};}

/* ══════════════ SYMMETRY ══════════════
  Mirror axis = horizontal dividing line.
  Shot fired at (fx, fy) in OWN panel →
  mirror in RIVAL panel lands at (fx, 1-fy).
*/
function mirrorFy(fy){return 1-fy;}

/* Pixel distance from shot (gfx,gfy in OWN panel)
   to ship centre (sfx,sfy in RIVAL panel).
   Convert both to pixels using rival panel dims. */
function hitCheck(gfx,gfy,ship,rivalP){
  const r=rivalPanel(rivalP).getBoundingClientRect();
  const sx=gfx*r.width, sy=mirrorFy(gfy)*r.height;
  const cx=ship.fx*r.width, cy=ship.fy*r.height;
  let dx=sx-cx, dy=sy-cy;
  // For rotated ships, rotate the delta into ship-local space
  if(ship.angleDeg){
    const rad=-ship.angleDeg*Math.PI/180;
    const rdx=dx*Math.cos(rad)-dy*Math.sin(rad);
    const rdy=dx*Math.sin(rad)+dy*Math.cos(rad);
    dx=rdx; dy=rdy;
  }
  const hw=ship.type.w/2, hh=ship.type.h/2;
  const inBox=(Math.abs(dx)<=hw && Math.abs(dy)<=hh);
  const pxDist=Math.sqrt((sx-cx)**2+(sy-cy)**2);
  const diag=Math.sqrt(r.width**2+r.height**2);
  const errPct=(pxDist/diag)*100;
  return{hit:inBox, errPct, pxDist, mirrorX:sx, mirrorY:sy};}

/* ══════════════ SHIP DOM ══════════════ */
function createShipEl(ship,playerColor){
  const wrap=document.createElement('div');
  wrap.className='mk no-transition';
  wrap.dataset.shipId=ship.id;
  const svg=ship.type.draw(playerColor,ship.hp,ship.type.hp);
  wrap.appendChild(svg);
  const ang=ship.angleDeg||0;
  wrap.style.transform=`translate(-50%,-50%) rotate(${ang}deg)`;
  return wrap;}

function panelW(el){return el.getBoundingClientRect().width||el.offsetWidth||window.innerWidth;}
function panelH(el){return el.getBoundingClientRect().height||el.offsetHeight||(window.innerHeight/2);}
function positionShipEl(wrap,panel,fx,fy){
  const w=panelW(panel),h=panelH(panel);
  wrap.style.left=(fx*w)+'px';
  wrap.style.top=(fy*h)+'px';}

function setShipAngle(ship){
  if(!ship.wrap)return;
  const ang=ship.angleDeg||0;
  ship.wrap.style.transform=`translate(-50%,-50%) rotate(${ang}deg)`;}

function redrawShipSVG(ship,playerColor){
  if(!ship.wrap)return;
  ship.wrap.innerHTML='';
  const drawColor=ship.hp<=0?'#1a3060':playerColor;
  const svg=ship.type.draw(drawColor,ship.hp,ship.type.hp);
  ship.wrap.appendChild(svg);
  setShipAngle(ship);}

/* ══════════════ PLACEMENT ══════════════ */
function initPicks(player){
  picks[player]={};SHIP_TYPES.forEach(t=>{picks[player][t.id]=t.quota;});
  selectedType=SHIP_TYPES[0];}

function buildPicker(player){
  pickerBtns.innerHTML='';
  SHIP_TYPES.forEach(tt=>{
    const rem=picks[player][tt.id];
    const btn=document.createElement('div');
    btn.className='pBtn'+(tt===selectedType?' selected':'')+(rem<=0?' disabled':'');
    btn.style.color=hex(player);btn.style.borderColor=rem>0?'rgba(255,255,255,.12)':'rgba(255,255,255,.04)';
    const shapeWrap=document.createElement('div');shapeWrap.className='pBtn-shape';
    const svg=tt.draw(hex(player),tt.hp,tt.hp);svg.style.maxWidth='40px';svg.style.maxHeight='22px';
    shapeWrap.appendChild(svg);
    const cnt=document.createElement('div');cnt.className='pBtn-count';
    cnt.textContent=rem>0?`×${rem}`:'—';
    cnt.style.color=rem>0?hex(player):'rgba(255,255,255,.2)';
    btn.appendChild(shapeWrap);btn.appendChild(cnt);
    if(rem>0){btn.addEventListener('click',()=>{
      selectedType=tt;buildPicker(player);
      const msg=document.getElementById('picker-msg');
      const labelColor=(gameMode==='online')?myColor():hex(player);
      const labelName=(gameMode==='online')?myName:(player===1?(window._p1name||'Jugador 1'):(window._p2name||'Jugador 2'));
      msg.innerHTML=tt.id==='lg'
        ?`<span style="color:${labelColor};font-weight:300">${getInitials(labelName)}</span><span style="color:var(--muted)"> — pulsa y arrastra para girar</span>`
        :`<span style="color:${labelColor};font-weight:300">${getInitials(labelName)}</span>`;
    });}
    pickerBtns.appendChild(btn);});}

function getInitials(name){
  const parts=(name||'').trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return '??';
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[1][0]).toUpperCase();
}

function showDeployBanner(player){
  const p=panel(player);
  const old=p.querySelector('.deploy-banner'); if(old) old.remove();
  const el=document.createElement('div');
  el.className='deploy-banner';
  el.textContent='¡Despliega tu arsenal!';
  el.style.color=(gameMode==='online')?myColor():hex(player);
  p.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.remove(); },3000);
}

function startPlacement(player){
  placingPlayer=player;phase='place';ships[player]=[];initPicks(player);
  panel(player).querySelectorAll('.mk').forEach(d=>d.remove());
  panel(player).classList.remove('no-click');panel(player).classList.add('can-click','placing');

function startTrainBattle(){

        const hw=tt.w/2/pw+.02, hh=tt.h/2/ph+.02;
        const fx=hw+Math.random()*(1-2*hw);
        const fyMin=Math.max(hh,0.20); // pTop: zona prohibida en el 20% superior
        const fyMax=1-hh;
        const fy=fyMin+Math.random()*(fyMax-fyMin);
        const angleDeg=tt.id==='lg'?snapAngle(Math.random()*360):0;
        const ship={type:tt,fx,fy,hp:tt.hp,id:ships[1].length,wrap:null,angleDeg};

        ship.wrap=wrap;

    // Human is player 2 (pBot), enemy is player 1 (pTop), enemy never shoots

    currentPlayer=2;
    buildPips(); refreshScores();
    picker.classList.add('hide');

    // Show enemy ships in pTop, hide pBot ships (none)

function randomPlacement(player){
  // Clear existing ships AND marks from the panel
  ships[player].forEach(s=>{ if(s.wrap) s.wrap.remove(); });
  panel(player).querySelectorAll('.shot-mk,.impact-mk').forEach(d=>d.remove());
  ships[player]=[];initPicks(player);
  const p=panel(player);
  requestAnimationFrame(()=>{
    const pw=panelW(p), ph=panelH(p);
    SHIP_TYPES.forEach(tt=>{
      for(let q=0;q<tt.quota;q++){
        const hw=tt.w/2/pw+.02,hh=tt.h/2/ph+.02;
        const fx=hw+Math.random()*(1-2*hw);
        // Restringir fy al borde lejano: pTop→no arriba, pBot→no abajo
        const fyMin=Math.max(hh, panel(player)===pTop?0.20:hh);
        const fyMax=Math.min(1-hh, panel(player)===pBot?0.80:1-hh);
        const fy=fyMin+Math.random()*(fyMax-fyMin);
        const angleDeg=tt.id==='lg'?snapAngle(Math.random()*360):0;
        const ship={type:tt,fx,fy,hp:tt.hp,id:ships[player].length,wrap:null,angleDeg};
        ships[player].push(ship);

        positionShipEl(wrap,p,fx,fy);

    panel(player).classList.remove('placing');
    setTimeout(()=>placementDone(player),300);
  });
}

/* ══ PLACEMENT EVENT HANDLERS ══ */
let lgDrag=null;

function snapAngle(deg){ return Math.round(deg/45)*45; }

function getFrac(clientX,clientY,panelEl){
  const r=panelEl.getBoundingClientRect();
  return {
    fx:Math.min(.95,Math.max(.05,(clientX-r.left)/r.width)),
    fy:Math.min(.95,Math.max(.05,(clientY-r.top)/r.height))
  };
}
// Para placement: limita fy solo en el borde lejano del panel
// pTop: prohibido fy < 0.20 (borde superior)
// pBot: prohibido fy > 0.80 (borde inferior)
// El toque siempre se registra (para poder apuntar/arrastrar), pero la
// posición se clampea a la zona válida y se marca _warn para avisar.
function getPlaceFrac(clientX,clientY,panelEl){
  const raw=getFrac(clientX,clientY,panelEl);
  const isTop=panelEl===pTop;
  const OUT_ZONE=0.20;
  if(isTop && raw.fy < OUT_ZONE) return {...raw, fy:OUT_ZONE, _warn:true};
  if(!isTop && raw.fy > (1-OUT_ZONE)) return {...raw, fy:1-OUT_ZONE, _warn:true};
  return raw;
}
let _buzzTimeout=null;
function placeBuzz(panelEl){
  if(_buzzTimeout) return;
  // Vibración
  if(navigator.vibrate) navigator.vibrate([40,20,40]);
  // Audio buzz
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='square';osc.frequency.value=120;
    gain.gain.setValueAtTime(.18,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.22);
    osc.start();osc.stop(ctx.currentTime+.22);
  }catch(e){}
  // Flash visual
  panelEl.classList.add('zone-warn');
  _buzzTimeout=setTimeout(()=>{
    panelEl.classList.remove('zone-warn');
    _buzzTimeout=null;
  },600);
}

function doPlace(player,fx,fy,angleDeg){
  if(picks[player][selectedType.id]<=0){
    const avail=SHIP_TYPES.find(t=>picks[player][t.id]>0);
    if(!avail)return null; selectedType=avail; buildPicker(player);
  }
  const tt=selectedType;
  const ship={type:tt,fx,fy,hp:tt.hp,id:ships[player].length,wrap:null,angleDeg:angleDeg||0};
  ships[player].push(ship);
  picks[player][tt.id]--;
  const shipColor=(gameMode==='online')?myColor():hex(player);
  const wrap=createShipEl(ship,shipColor);
  panel(player).appendChild(wrap);
  positionShipEl(wrap,panel(player),fx,fy);
  ship.wrap=wrap;
  if(picks[player][tt.id]===0){
    const avail=SHIP_TYPES.find(t=>picks[player][t.id]>0);
    if(avail) selectedType=avail;
  }
  buildPicker(player);
  const placed=ships[player].length, rem=TOTAL_SHIPS-placed;
  phaseMsg.innerHTML=rem>0
    ?`<b style="color:${ch(player)}">J${player}</b> — ${rem} nave${rem!==1?'s':''} restante${rem!==1?'s':''}`
    :`<b style="color:${ch(player)}">J${player}</b> — listo`;
  if(SHIP_TYPES.every(t=>picks[player][t.id]===0)) setTimeout(()=>placementDone(player),200);
  return ship;
}

[pTop,pBot].forEach((pan,i)=>{
  const player=i+1;

  pan.addEventListener('touchstart',e=>{
    if(phase!=='place'||placingPlayer!==player)return;
    e.preventDefault();
    const t=e.touches[0];
    const place=getPlaceFrac(t.clientX,t.clientY,pan);
    if(place._warn) placeBuzz(pan);
    const {fx,fy}=place;
    if(selectedType.id==='lg'){
      const ship=doPlace(player,fx,fy,0);
      if(ship) lgDrag={ship,player,x0:t.clientX,y0:t.clientY};
    } else {
      const t0=e.touches[0];
      pan._tplace={fx,fy,_x0:t0.clientX,_y0:t0.clientY};
    }
  },{passive:false});

  pan.addEventListener('touchmove',e=>{
    if(phase!=='place'||placingPlayer!==player)return;
    e.preventDefault();
    if(lgDrag&&lgDrag.player===player){
      const t=e.touches[0];
      const dx=t.clientX-lgDrag.x0, dy=t.clientY-lgDrag.y0;
      if(Math.abs(dx)>6||Math.abs(dy)>6){
        lgDrag.ship.angleDeg=snapAngle(Math.atan2(dy,dx)*180/Math.PI);
        setShipAngle(lgDrag.ship);
      }
    } else if(pan._tplace){
      const t=e.touches[0];
      const dx=Math.abs(t.clientX-pan._tplace._x0), dy=Math.abs(t.clientY-pan._tplace._y0);
      if(dx>9||dy>9) pan._tplace=null; // cancel only on real movement
    }
  },{passive:false});

  pan.addEventListener('touchend',e=>{
    if(phase!=='place'||placingPlayer!==player)return;
    e.preventDefault();
    if(lgDrag&&lgDrag.player===player){
      lgDrag=null;
    } else if(pan._tplace){
      const {fx,fy}=pan._tplace;
      pan._tplace=null;
      doPlace(player,fx,fy,0);
    }
  },{passive:false});

  pan.addEventListener('mousedown',e=>{
    if(phase!=='place'||placingPlayer!==player||selectedType.id!=='lg')return;
    const _pf=getPlaceFrac(e.clientX,e.clientY,pan);
    if(_pf._warn) placeBuzz(pan);
    const {fx,fy}=_pf;
    const ship=doPlace(player,fx,fy,0);
    if(!ship)return;
    lgDrag={ship,player,x0:e.clientX,y0:e.clientY};
    const onMove=ev=>{
      const dx=ev.clientX-lgDrag.x0, dy=ev.clientY-lgDrag.y0;
      if(Math.abs(dx)>6||Math.abs(dy)>6){
        lgDrag.ship.angleDeg=snapAngle(Math.atan2(dy,dx)*180/Math.PI);
        setShipAngle(lgDrag.ship);
      }
    };
    const onUp=()=>{ lgDrag=null; document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });

  pan.addEventListener('click',e=>{
    if(phase!=='place'||placingPlayer!==player||selectedType.id==='lg')return;
    const _pf=getPlaceFrac(e.clientX,e.clientY,pan);
    if(_pf._warn) placeBuzz(pan);
    const {fx,fy}=_pf;
    doPlace(player,fx,fy,0);
  });
});

let firingLocked=false; // guard against stray clicks after handoff

function startGame(){
  phase='game';history=[];score={1:0,2:0};
  [1,2].forEach(p=>{panel(p).querySelectorAll('.shot-mk,.impact-mk').forEach(d=>d.remove());});
  [1,2].forEach(p=>ships[p].forEach(s=>{ if(s.wrap) s.wrap.style.display='none'; }));
  remaining={
    1:ships[2].map((_,i)=>i).filter(i=>ships[2][i].hp>0),
    2:ships[1].map((_,i)=>i).filter(i=>ships[1][i].hp>0)};

  if(gameMode==='local') activateEditablePtags();
  renderGamePanels();
  showToast(`J${currentPlayer}`,null,'🎲 Primer turno aleatorio',1800);

/* render: show both panels from current player's POV
   OWN panel  → hide own ships, show only shot marks
   RIVAL panel → show rival ships + impact marks (no shot marks)
*/
function renderGamePanels(){
  const cp=currentPlayer, riv=cp===1?2:1;
  const ownP=panel(cp), rivP=rivalPanel(cp);

  // Remove all transient marks from both panels
  ownP.querySelectorAll('.shot-mk,.impact-mk').forEach(d=>d.remove());
  rivP.querySelectorAll('.shot-mk,.impact-mk').forEach(d=>d.remove());

  // Hide ALL ships first, then selectively show rival ships in rival panel
  ships[1].forEach(s=>{ if(s.wrap) s.wrap.style.display='none'; });
  ships[2].forEach(s=>{ if(s.wrap) s.wrap.style.display='none'; });

  // ── OWN PANEL: no ships, show shot history + received impacts ──
  history.filter(h=>h.player===cp).forEach(h=>{
    const r=ownP.getBoundingClientRect();
    const mk=document.createElement('div');mk.className='mk shot-mk';
    mk.style.left=(h.gfx*r.width)+'px';mk.style.top=(h.gfy*r.height)+'px';
    mk.appendChild(drawShotSVG(hex(cp),h.hit));ownP.appendChild(mk);});
  history.filter(h=>h.player===riv).forEach(h=>{
    const r=ownP.getBoundingClientRect();
    const mx=h.gfx*r.width, my=mirrorFy(h.gfy)*r.height;
    const mk=document.createElement('div');mk.className=`mk impact-mk${h.hit?' hit-shrink no-delay':''}`;;
    mk.style.left=mx+'px';mk.style.top=my+'px';
    mk.appendChild(drawImpactSVG(hex(riv),h.hit));ownP.appendChild(mk);});

  // ── RIVAL PANEL: show rival ships + cp's impact marks ──
  ships[riv].forEach(s=>{ if(s.wrap) s.wrap.style.display=''; });
  history.filter(h=>h.player===cp).forEach(h=>{
    const mk=document.createElement('div');mk.className=`mk impact-mk${h.hit?' hit-shrink no-delay':''}`;;
    mk.style.left=h.mirrorX+'px';mk.style.top=h.mirrorY+'px';
    mk.appendChild(drawImpactSVG(hex(cp),h.hit));rivP.appendChild(mk);});

  // Enable own panel for shooting, disable rival panel
  ownP.classList.remove('no-click');ownP.classList.add('can-click');
  rivP.classList.add('no-click');rivP.classList.remove('can-click');

  const nextIdx=remaining[cp][0];
  const nextShip=nextIdx!==undefined?ships[riv][nextIdx]:null;
  phaseMsg.innerHTML=nextShip
    ?`<b style="color:${ch(cp)}">J${cp}</b> — apunta a <b>${nextShip.type.label}</b> nº${nextIdx+1} · HP ${nextShip.hp}/${nextShip.type.hp}`
    :`<b style="color:${ch(cp)}">J${cp}</b>`;
  refreshPips();
}

// Build cursor SVG
(()=>{
  const sz=48,c=sz/2;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',sz);svg.setAttribute('height',sz);
  svg.setAttribute('viewBox',`0 0 ${sz} ${sz}`);
  const mk=(tag,attrs)=>{const el=document.createElementNS(ns,tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;};
  svg.appendChild(mk('circle',{cx:c,cy:c,r:c-2,stroke:'#fff','stroke-width':1,fill:'none',opacity:.25}));
  svg.appendChild(mk('circle',{cx:c,cy:c,r:c*.5,stroke:'#fff','stroke-width':1.2,fill:'none',opacity:.6}));
  svg.appendChild(mk('circle',{cx:c,cy:c,r:2.5,fill:'#fff',opacity:.95}));
  [[c,2,c,c-8],[c,c+8,c,sz-2],[2,c,c-8,c],[c+8,c,sz-2,c]].forEach(([x1,y1,x2,y2])=>
    svg.appendChild(mk('line',{x1,y1,x2,y2,stroke:'#fff','stroke-width':1,opacity:.7})));
  aimCursor.appendChild(svg);

let aimClientX=0,aimClientY=0,aimActive=false;

// Offset toward the dividing line: top panel → shift down, bottom panel → shift up
function getAimShift(player){
  const p=panel(player);
  const h=p.getBoundingClientRect().height||p.offsetHeight||200;
  return Math.round(h*0.10);
}
function calcAimPos(touchX,touchY,player){
  const shift=getAimShift(player);
  const dy=player===1?shift:-shift;
  return {x:touchX, y:touchY+dy};
}

function showCursor(x,y,color){
  aimCursor.style.left=x+'px';
  aimCursor.style.top=y+'px';
  aimCursor.querySelectorAll('circle,line').forEach(el=>el.setAttribute('stroke',color));
  aimCursor.querySelector('circle:last-of-type').setAttribute('fill',color);
  aimCursor.classList.add('show');
  aimClientX=x; aimClientY=y;
}
function hideCursor(){ aimCursor.classList.remove('show'); aimActive=false; }

function isMyTurn(player){
  if(gameMode==='online') return activeTurnId===myId&&!firingLocked;
  return phase==='game'&&currentPlayer===player&&!firingLocked;
}

function addFireTouch(panelEl,player){
  panelEl.addEventListener('touchstart',e=>{
    if(phase!=='game'||!isMyTurn(player))return;
    if(gameMode==='online'&&player!==2)return; // online always fires from pBot (slot 2)
    if(e.target.classList.contains('ptag'))return;
    e.preventDefault();
    aimActive=true;
    const t=e.touches[0];
    const pos=calcAimPos(t.clientX,t.clientY,player);
    showCursor(pos.x,pos.y,'#a8d4ff');
  },{passive:false});

  panelEl.addEventListener('touchmove',e=>{
    if(!aimActive)return;
    e.preventDefault();
    const t=e.touches[0];
    const r=panelEl.getBoundingClientRect();
    const cx=Math.min(r.right-1,Math.max(r.left+1,t.clientX));
    const cy=Math.min(r.bottom-1,Math.max(r.top+1,t.clientY));
    const pos=calcAimPos(cx,cy,player);
    showCursor(pos.x,pos.y,'#a8d4ff');
    if(gameMode==='online'){
      const gfx=Math.min(1,Math.max(0,(pos.x-r.left)/r.width));
      const gfy=Math.min(1,Math.max(0,(pos.y-r.top)/r.height));
      broadcastAim(gfx,gfy);
    }
  },{passive:false});

  panelEl.addEventListener('touchend',e=>{
    if(!aimActive){hideCursor();return;}
    e.preventDefault();
    hideCursor();
    if(gameMode==='online') sendMsg({type:'aim_end'});
    const fx=aimClientX;
    const fy=aimClientY;
    if(gameMode==='online') handleFireOnline({clientX:fx,clientY:fy});
    else handleFire({clientX:fx,clientY:fy},player);
  },{passive:false});

  panelEl.addEventListener('touchcancel',()=>hideCursor());
}

let lastTouch=0;
pTop.addEventListener('click',e=>{
  if(Date.now()-lastTouch<600)return;
  if(gameMode==='online')return; // online never fires from pTop
  if(isMyTurn(1)) handleFire(e,1);
});
pBot.addEventListener('click',e=>{
  if(Date.now()-lastTouch<600)return;
  if(gameMode==='online'&&activeTurnId===myId&&!firingLocked) handleFireOnline(e);

});

function activateEditablePtags(){
  [1,2].forEach(p=>{
    const tag=panel(p).querySelector('.ptag');

    const name=p===1?(window._p1name||'Jugador 1'):(window._p2name||'Jugador 2');

    tag.classList.add('editable');
    // Clone to clear old listeners
    const fresh=tag.cloneNode(true);
    tag.parentNode.replaceChild(fresh,tag);
    fresh.classList.add('editable');
    fresh.addEventListener('click',e=>{ e.stopPropagation(); window.openNameEditor(p); });
    fresh.addEventListener('touchstart',e=>{ e.stopPropagation(); },{passive:true});
    fresh.addEventListener('touchend',e=>{ e.stopPropagation(); e.preventDefault(); window.openNameEditor(p); },{passive:false});
  });
}

function handleFire(e,player){
  if(firingLocked)return;
  const rem=remaining[player];if(!rem.length)return;
  const ownP=panel(player);
  const r=ownP.getBoundingClientRect();
  const gfx=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  const gfy=Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));
  const rivShips=ships[player===1?2:1];
  let bestHit=null, bestDist=Infinity;
  rem.forEach(idx=>{
    const ship=rivShips[idx];
    const res=hitCheck(gfx,gfy,ship,player);
    if(res.hit&&res.pxDist<bestDist){bestDist=res.pxDist;bestHit={idx,ship,res};}
  });
  let hitResult=bestHit;
  // error % vs current target for display
  const targetIdx=rem[0];
  const targetShip=rivShips[targetIdx];
  const targetRes=hitCheck(gfx,gfy,targetShip,player);
  const displayErr=targetRes.errPct;

  const isHit=hitResult!==null;
  // mirror position in rival panel (absolute px)
  const rivR=rivalPanel(player).getBoundingClientRect();
  const mirrorX=gfx*rivR.width, mirrorY=mirrorFy(gfy)*rivR.height;
  const entry={player,gfx,gfy,hit:isHit,errPct:displayErr,mirrorX,mirrorY,
    hitShipIdx:isHit?hitResult.idx:null};
  history.push(entry);

  if(isHit){
    const ship=hitResult.ship;
    ship.hp--;
    const shipOwner=player===1?2:1;
    redrawShipSVG(ship,hex(shipOwner));
    miniExplosion(rivalPanel(player),mirrorX,mirrorY,hex(player));
    if(ship.hp<=0){
      remaining[player]=remaining[player].filter(i=>i!==hitResult.idx);
      score[player]++;
    } else {
      if(ship.type.canMove){dodgeShip(ship,shipOwner);}
    }
  }
  refreshScores();

  // Re-render immediately so impact/explosion is visible
  renderGamePanels();
  // Block clicks while toast shows
  pTop.classList.add('no-click');pTop.classList.remove('can-click');
  pBot.classList.add('no-click');pBot.classList.remove('can-click');

  const err=displayErr.toFixed(1)+'%';
  const cls=displayErr<5?'perfect':displayErr<12?'good':displayErr<22?'ok':'bad';
  if(isHit){
    const sunk=hitResult.ship.hp<=0;
    showToast(err,cls,sunk?`💥 Hundida · J${player} continúa`:`🔥 Impacto · J${player} continúa`,1500);
  } else {
    showToast(err,cls,`❌ Fallo · turno J${player===1?2:1}`,1500);
  }
  setTimeout(()=>afterShot(isHit,player),1600);
}

/* Dodge: move ship a small random amount within its panel */
function dodgeShip(ship,owner){
  const p=panel(owner);const r=p.getBoundingClientRect();
  const hw=ship.type.w/2/r.width, hh=ship.type.h/2/r.height;
  const dx=(Math.random()-.5)*.15, dy=(Math.random()-.5)*.15;
  ship.fx=Math.min(1-hw,Math.max(hw,ship.fx+dx));
  ship.fy=Math.min(1-hh,Math.max(hh,ship.fy+dy));
  if(ship.wrap){
    ship.wrap.classList.remove('no-transition');
    positionShipEl(ship.wrap,p,ship.fx,ship.fy);}}

/* Mini explosion SVG */
function miniExplosion(panelEl,x,y,color){
  const wrap=document.createElement('div');wrap.className='mini-exp';
  wrap.style.left=x+'px';wrap.style.top=y+'px';
  const sz=40,svg=mkSVG(sz,sz),cx=sz/2,cy=sz/2;
  addEl(svg,'circle',{cx,cy,r:sz*.35,stroke:color,'stroke-width':1.5,fill:'none',opacity:.9});
  for(let i=0;i<8;i++){const a=i*Math.PI/4,r1=sz*.1,r2=sz*.45;
    addEl(svg,'line',{x1:cx+r1*Math.cos(a),y1:cy+r1*Math.sin(a),x2:cx+r2*Math.cos(a),y2:cy+r2*Math.sin(a),stroke:color,'stroke-width':i%2===0?2:1,opacity:.95});}
  addEl(svg,'circle',{cx,cy,r:4,fill:'#fff',opacity:1});
  wrap.appendChild(svg);panelEl.appendChild(wrap);
  setTimeout(()=>wrap.remove(),600);}

/* Shot / Impact SVGs */
function drawShotSVG(color,hit){
  const sz=hit?20:13,cx=sz/2,cy=sz/2,svg=mkSVG(sz,sz);
  const a=hit?.82:.35,sw=hit?1:.6,r=sz*.3,g=sz*.13;
  const segs=[[cx-g,cy,r,90,180],[cx,cy-g,r,180,270],[cx+g,cy,r,270,360],[cx,cy+g,r,0,90]];
  for(const[ox,oy,rr,sa,ea]of segs){const p=ns('path');
    const s1=sa*Math.PI/180,e1=ea*Math.PI/180;
    p.setAttribute('d',`M${ox+rr*Math.cos(s1)},${oy+rr*Math.sin(s1)} A${rr},${rr} 0 0,1 ${ox+rr*Math.cos(e1)},${oy+rr*Math.sin(e1)}`);
    p.setAttribute('stroke',color);p.setAttribute('stroke-width',sw);p.setAttribute('fill','none');p.setAttribute('opacity',a);svg.appendChild(p);}
  addEl(svg,'circle',{cx,cy,r:hit?1.5:.9,fill:color,opacity:a});return svg;}

function drawImpactSVG(color,hit){
  const sz=hit?30:16,cx=sz/2,cy=sz/2,svg=mkSVG(sz,sz);
  if(hit){
    addEl(svg,'circle',{cx,cy,r:sz*.4,stroke:color,'stroke-width':.9,fill:'none',opacity:.4});
    for(let i=0;i<8;i++){const a=i*Math.PI/4,r1=sz*.22,r2=sz*.44;
      addEl(svg,'line',{x1:cx+r1*Math.cos(a),y1:cy+r1*Math.sin(a),x2:cx+r2*Math.cos(a),y2:cy+r2*Math.sin(a),stroke:color,'stroke-width':i%2===0?1.2:.6,opacity:.85});}
    addEl(svg,'circle',{cx,cy,r:2.5,fill:color,opacity:1});
  } else {
    addEl(svg,'circle',{cx,cy,r:sz*.38,stroke:color,'stroke-width':.7,fill:'none',opacity:.28});
    const d=sz*.24;
    for(const[dx,dy]of[[1,1],[1,-1]]){
      addEl(svg,'line',{x1:cx-d*dx,y1:cy-d*dy,x2:cx+d*dx,y2:cy+d*dy,stroke:color,'stroke-width':.8,opacity:.4});}}
  return svg;}

function afterShot(hit,player){
  // Win: in training human is player 2, wins when remaining[2] empty
  const trainWin=gameMode==='train'&&remaining[2].length===0;
  const localWin=gameMode!=='train'&&(remaining[1].length===0||remaining[2].length===0);
  if(trainWin||localWin){setTimeout(showFinal,400);return;}

  if(hit){
    renderGamePanels();
  } else {
    if(gameMode==='train'){
      // Miss in training — no turn switch, player 2 keeps shooting
      renderGamePanels();
    } else {
      currentPlayer=currentPlayer===1?2:1;
      if(!remaining[currentPlayer].length){setTimeout(showFinal,400);return;}
      showHandoff(currentPlayer);
    }
  }
}

function showHandoff(nextPlayer){
  firingLocked=true;
  showPlayerLabel(nextPlayer,()=>{
    renderGamePanels();
    setTimeout(()=>{ firingLocked=false; },300);
  });
}

/* Toast */
function showToast(errText,cls,msg,dur){
  toastErr.textContent=errText;
  toastErr.className=cls||'';
  if(!cls)toastErr.style.color=errText.startsWith('J')?hex(parseInt(errText[1])):'var(--text)';
  else toastErr.style.color='';
  toastMsg.innerHTML=msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),dur||1400);}

/* Final */
function showFinal(){
  phase='done';
  pTop.classList.add('no-click');pBot.classList.add('no-click');
  const tbl=document.getElementById('fo-table');
  tbl.innerHTML=`<div class="ftr hdr"><div>#</div><div>J1</div><div>J2</div><div>Res</div></div>`;
  let t1=0,t2=0,n1=0,n2=0;
  for(let i=0;i<TOTAL_SHIPS;i++){
    const h1=history.filter(h=>h.player===1&&h.hitShipIdx===i);
    const h2=history.filter(h=>h.player===2&&h.hitShipIdx===i);
    const s2=ships[2][i],s1=ships[1][i];
    const sunk1=s2&&s2.hp<=0,sunk2=s1&&s1.hp<=0;
    let w='—';if(sunk1&&!sunk2)w='<span class="tag tg1">J1</span>';
    else if(sunk2&&!sunk1)w='<span class="tag tg2">J2</span>';
    else if(sunk1&&sunk2)w='<span class="tag tgt">X</span>';
    const e1=h1.length?h1[h1.length-1].errPct:null;
    const e2=h2.length?h2[h2.length-1].errPct:null;
    if(e1!==null){t1+=e1;n1++;}if(e2!==null){t2+=e2;n2++;}
    const row=document.createElement('div');row.className='ftr';
    row.innerHTML=`<div class="fen">${i+1}</div><div class="fe1">${e1!==null?e1.toFixed(1)+'%':'—'}</div><div class="fe2">${e2!==null?e2.toFixed(1)+'%':'—'}</div><div class="few">${w}</div>`;
    tbl.appendChild(row);}
  const a1=n1?t1/n1:0,a2=n2?t2/n2:0;
  document.getElementById('fo-t1v').textContent=`${a1.toFixed(1)}% · ${score[1]} hundidas`;
  document.getElementById('fo-t2v').textContent=`${a2.toFixed(1)}% · ${score[2]} hundidas`;
  const fw=document.getElementById('fo-winner');
  if(score[1]>score[2]){fw.textContent='🏆 Victoria — Jugador 1';fw.style.color=hex(1);}
  else if(score[2]>score[1]){fw.textContent='🏆 Victoria — Jugador 2';fw.style.color=hex(2);}
  else if(a1<a2){fw.textContent='🏆 J1 gana por precisión';fw.style.color=hex(1);}
  else if(a2<a1){fw.textContent='🏆 J2 gana por precisión';fw.style.color=hex(2);}
  else{fw.textContent='⚔ Empate';fw.style.color='#a8d4ff';}
  foOverlay.classList.add('show');}

function loadRoomsList(){
  if(!fbDb){ fbInit(); }
  if(!fbDb) return;
  const listEl=document.getElementById('room-list');
  listEl.innerHTML='<div class="room-empty">Buscando salas…</div>';

  stopRoomsListener();
  roomsListenerRef=fbDb.ref('rooms');

  // Clean up stale rooms (older than 5 min of inactivity)
  const cutoff=Date.now()-5*60*1000;

  roomsListenerRef.on('value', snap=>{
    const rooms=snap.val()||{};
    listEl.innerHTML='';
    const active=[];
    Object.entries(rooms).forEach(([id,room])=>{
      if(!room.meta) return;
      const lastActivity=room.meta.lastActivity||room.meta.created||0;
      if(lastActivity<cutoff){
        // Auto-delete stale room
        fbDb.ref('rooms/'+id).remove();
        return;
      }
      const players=Object.values(room.players||{});
      if(!players.length) return;
      active.push({id,meta:room.meta,players,lastActivity});
    });

    if(!active.length){
      listEl.innerHTML='<div class="room-empty">No hay partidas activas</div>';
      return;
    }

    active.sort((a,b)=>b.meta.created-a.meta.created);
    active.forEach(({id,meta,players})=>{
      const item=document.createElement('div');
      item.className='room-item';
      const age=Math.round((Date.now()-meta.created)/60000);

        stopRoomsListener();
        myName=(lobbyName.value.trim()||'Comandante').slice(0,16);
        clientJoin(id);
      });
      listEl.appendChild(item);

    stopRoomsListener();
    myName=(lobbyName.value.trim()||'Comandante').slice(0,16);

  };
}

/* ═══════════════════════════════════════════════
   FIREBASE MESSAGING
═══════════════════════════════════════════════ */
function sendMsg(obj){
  if(!fbMsgRef) return;
  obj._from=myId;
  obj._id=Math.random().toString(36).slice(2);
  obj._ts=Date.now();
  fbMsgRef.push(obj);
  // Update room activity timestamp
  if(fbRoom) fbRoom.child('meta/lastActivity').set(Date.now());
}

function sendTo(pid, obj){ obj._to=pid; sendMsg(obj); }
function broadcastAll(obj, excludeId){
  obj._broadcast=true;
  obj._exclude=excludeId||null;
  sendMsg(obj);
}
function hostSend(obj){ sendTo(isHost?myId:'host', obj); }

function startListening(){
  if(fbMsgListener){ fbMsgRef.off('child_added',fbMsgListener); }
  // Only listen to messages from now on
  const since=Date.now();
  fbMsgListener=fbMsgRef.orderByChild('_ts').startAt(since).on('child_added',snap=>{
    const msg=snap.val();
    if(!msg||processedMsgIds.has(msg._id)) return;
    processedMsgIds.add(msg._id);
    if(msg._from===myId) return; // own message
    // Check if addressed to me
    if(msg._to && msg._to!==myId && msg._to!=='host') return;
    if(msg._broadcast && msg._exclude===myId) return;
    // Route
    if(isHost) hostReceive(msg);
    else clientReceive(msg);
  });
}

function hostCreate(){
  lobbyStart.disabled=true;
  lobbyStatus.textContent='Creando sala…';
  isHost=true; myTeam=myPreferredTeam;
  myId='host_'+Date.now().toString(36);
  myRoomId=Math.random().toString(36).slice(2,8).toUpperCase();

  fbRoom=fbDb.ref('rooms/'+myRoomId);
  fbMsgRef=fbRoom.child('messages');
  fbPresenceRef=fbRoom.child('players/'+myId);

  // Write host presence
  fbPresenceRef.set({id:myId,name:myName,team:myTeam,ts:Date.now()});
  fbPresenceRef.onDisconnect().remove();

  // Write room meta
  fbRoom.child('meta').set({host:myId,created:Date.now(),lastActivity:Date.now(),roomId:myRoomId});

  combatants[myId]={id:myId,name:myName,team:myTeam,ships:[],_shipObjs:[],inGame:false,score:0};

  startListening();

  // Go directly to placement
  lobbyEl.classList.add('hide');
  document.getElementById('game-shell').classList.add('show');
  buildPips();
  startPlacement(1);
  startPlacementTimer(30,()=>{ if(ships[1].length<10) randomPlacement(1); });
  showInviteButton();

  // Listen for new players joining
  fbRoom.child('players').on('child_added',snap=>{
    const p=snap.val();
    if(!p||p.id===myId) return;
    if(!combatants[p.id]){
      combatants[p.id]={id:p.id,name:p.name,team:'?',ships:[],_shipObjs:[],inGame:false,score:0};
    }
    // Send room state to new joiner
    setTimeout(()=>{
      sendTo(p.id,{
        type:'room_state',
        players:serializeCombatants(),
        hostId:myId,
        battleStarted,
        avgShips:calcAvgLivingShips()
      });
    }, 500);
    if(phase==='game'||combatants[myId].inGame){
      showToast('','tg1','⚔️ ¡Ataque enemigo!',2500);
    }
  });

  // Listen for players leaving
  fbRoom.child('players').on('child_removed',snap=>{
    const p=snap.val();
    if(p&&p.id!==myId) onPeerLeft(p.id);
  });

  lobbyStatus.textContent='';
}

/* ═══════════════════════════════════════════════
   CLIENT
═══════════════════════════════════════════════ */
function clientJoin(rid){
  lobbyStart.disabled=true;
  lobbyStatus.textContent='Conectando…';
  isHost=false; myRoomId=rid.toUpperCase();
  myId='guest_'+Date.now().toString(36);

  fbRoom=fbDb.ref('rooms/'+myRoomId);
  fbMsgRef=fbRoom.child('messages');
  fbPresenceRef=fbRoom.child('players/'+myId);

  // Check room exists
  fbRoom.child('meta').once('value',snap=>{
    if(!snap.exists()){
      lobbyStatus.textContent='Sala no encontrada. Comprueba el enlace.';
      lobbyStart.disabled=false;
      return;
    }
    // Write presence
    fbPresenceRef.set({id:myId,name:myName,team:'?',ts:Date.now()});
    fbPresenceRef.onDisconnect().remove();

    combatants[myId]={id:myId,name:myName,team:'?',ships:[],_shipObjs:[],inGame:false,score:0};
    startListening();
    lobbyStatus.textContent='Conectado. Esperando sala…';
  });
}

/* ═══════════════════════════════════════════════
   HOST RECEIVES
═══════════════════════════════════════════════ */
function hostReceive(msg){
  const fromId=msg._from;

  switch(msg.type){

    case 'hello':{
      combatants[fromId]={id:fromId,name:msg.name,team:'?',ships:[],_shipObjs:[],inGame:false,score:0};
      sendTo(fromId,{
        type:'room_state',
        players:serializeCombatants(),
        hostId:myId,
        battleStarted,
        avgShips:calcAvgLivingShips()
      });
      broadcastAll({type:'player_joined',player:{id:fromId,name:msg.name,team:'?'}},fromId);
      break;
    }

    case 'choose_team':{
      if(combatants[fromId]) combatants[fromId].team=msg.team;
      const quota=battleStarted?calcAvgLivingShips():10;
      const team=msg.team||'B';
      sendTo(fromId,{type:'go_place',quota,team,battleStarted});
      broadcastAll({type:'player_team_set',id:fromId,team},fromId);
      break;
    }

    case 'ships_ready':{
      combatants[fromId].ships=msg.ships;
      combatants[fromId].inGame=true;
      reconstructShips(fromId,msg.ships);
      broadcastAll({type:'fleet_ready',id:fromId,name:combatants[fromId].name,team:combatants[fromId].team,ships:msg.ships},fromId);

      const readyPlayers=Object.values(combatants).filter(c=>c.inGame);
      const hasEnemies=readyPlayers.some(c=>c.team==='A')&&readyPlayers.some(c=>c.team==='B');

      if(!battleStarted&&hasEnemies){
        battleStarted=true;
        activeTurnId=fromId;
        const payload={type:'battle_start',activeTurnId,combatants:serializeCombatants(),allShips:buildShipsPayload()};
        broadcastAll(payload);
        onBattleStart(payload);
      } else if(battleStarted){
        sendTo(fromId,{type:'mid_join',activeTurnId,combatants:serializeCombatants(),allShips:buildShipsPayload()});
        injectTurnAfterCurrent(fromId);
        broadcastAll({type:'turn_update',activeTurnId});
      }
      break;
    }

    case 'host_placed':{
      combatants[myId].ships=msg.ships;
      combatants[myId].inGame=true;
      reconstructShips(myId,msg.ships);
      const ready=Object.values(combatants).filter(c=>c.inGame);
      const hasEnemies=ready.some(c=>c.team==='A')&&ready.some(c=>c.team==='B');
      if(!battleStarted&&hasEnemies){
        battleStarted=true;
        activeTurnId=Object.keys(combatants).find(id=>combatants[id].team==='B'&&combatants[id].inGame)||myId;
        const payload={type:'battle_start',activeTurnId,combatants:serializeCombatants(),allShips:buildShipsPayload()};
        broadcastAll(payload);
        onBattleStart(payload);
      }
      break;
    }

    case 'aim':{
      broadcastAll({...msg},fromId);
      showGhostCursor(msg.gfx,msg.gfy,enemyColor());
      break;
    }
    case 'aim_end':{
      broadcastAll({...msg},fromId);
      hideGhostCursor();
      break;
    }
    case 'shot':{
      broadcastAll({...msg},fromId);
      processShot(msg);
      applyRivalShot(msg);
      hideGhostCursor();
      // Check if shooter sunk all enemies → game over
      const shooterTeam=combatants[fromId]?combatants[fromId].team:null;
      const enemiesAllSunk=shooterTeam&&Object.values(combatants).every(c=>{
        if(c.team===shooterTeam||!c.inGame||!c._shipObjs) return true;
        return c._shipObjs.every(s=>s.hp<=0);
      });
      if(enemiesAllSunk){
        broadcastAll({type:'game_over',winnerId:fromId});
        showFinal();
      }
      break;
    }

    case 'turn_done':{
      advanceTurn(fromId);
      break;
    }
  }
}

/* ═══════════════════════════════════════════════
   CLIENT RECEIVES
═══════════════════════════════════════════════ */
function clientReceive(msg){

  switch(msg.type){

    case 'room_state':{
      if(msg.players) Object.assign(combatants, msg.players);
      showJoinScreen(msg);
      break;
    }

    case 'player_joined':{
      combatants[msg.player.id]=msg.player;
      updateLobbyList();
      break;
    }

    case 'player_team_set':{
      if(combatants[msg.id]) combatants[msg.id].team=msg.team;
      updateLobbyList();
      break;
    }

    case 'go_place':{
      myTeam=msg.team;
      const teamColor=msg.team==='A'?'var(--c1)':'var(--c2)';
      showArmingAlert();
      setTimeout(()=>{
        showToast('','','<span style="color:'+teamColor+'">Adelante Comandante</span>',2000);
      },400);
      setTimeout(()=>launchPlacement(msg.quota,msg.team),3200);
      break;
    }

    case 'fleet_ready':{
      combatants[msg.id]={...(combatants[msg.id]||{}),name:msg.name,team:msg.team,inGame:true};
      reconstructShips(msg.id,msg.ships);
      if(phase==='game') updateEnemyDisplay();
      break;
    }

    case 'battle_start':
    case 'mid_join':{
      onBattleStart(msg);
      break;
    }

    case 'aim':{
      if(msg._from!==myId) showGhostCursor(msg.gfx,msg.gfy,enemyColor());
      break;
    }
    case 'aim_end':{
      hideGhostCursor();
      break;
    }
    case 'shot':{
      hideGhostCursor();
      if(msg._from!==myId) applyRivalShot(msg);
      break;
    }

    case 'turn_update':{
      activeTurnId=msg.activeTurnId;
      renderOnlineGame();
      break;
    }

    case 'player_left':{
      delete combatants[msg.id];
      renderOnlineGame();
      break;
    }

    case 'game_over': showFinal(); break;
  }
}

function myColor(){ return myTeam==='A'?hex(1):hex(2); }
function enemyColor(){ return myTeam==='A'?hex(2):hex(1); }

function onBattleStart(msg){
  if(msg.combatants) Object.keys(msg.combatants).forEach(id=>{
    combatants[id]={...(combatants[id]||{}),...msg.combatants[id]};
  });
  activeTurnId=msg.activeTurnId;
  if(msg.allShips) Object.entries(msg.allShips).forEach(([id,arr])=>reconstructShips(id,arr));

  phase='game'; history=[]; score={1:0,2:0}; remaining={1:[],2:[]};
  stopPlacementTimer();
  [pTop,pBot].forEach(p=>p.querySelectorAll('.mk,.mini-exp,.shot-mk,.impact-mk').forEach(d=>d.remove()));

  myOnlineShips=(combatants[myId]&&combatants[myId]._shipObjs)||[];
  myOnlineShips.forEach(s=>{
    if(!s.wrap){
      const displayFy=myTeam==='A'?1-s.fy:s.fy;
      const w=createShipEl(s,myColor());
      pBot.appendChild(w); positionShipEl(w,pBot,s.fx,displayFy); s.wrap=w;
      s._displayFy=displayFy;
    }
    s.wrap.style.display='';
  });

  buildEnemyDisplay();
  showInviteButton();
  renderOnlineGame();

  const starterName=(activeTurnId===myId)?'Tú':(combatants[activeTurnId]?.name||'Rival');
  const starterColor=(activeTurnId===myId)?myColor():enemyColor();
  showToast('','',`🎲 Empieza disparando: <b style="color:${starterColor}">${starterName}</b>`,2200);
}

function buildEnemyDisplay(){
  enemyOnlineShips=[];
  Object.entries(combatants).forEach(([id,c])=>{
    if(id===myId||c.team===myTeam||!c._shipObjs) return;
    c._shipObjs.forEach(s=>{ s.ownerId=id; });
    enemyOnlineShips.push(...c._shipObjs);
  });
  enemyOnlineShips.forEach(s=>{
    if(!s.wrap){
      const enemyTeam=combatants[s.ownerId]?.team||'B';
      const displayFy=enemyTeam==='B'?1-s.fy:s.fy;
      const w=createShipEl(s,enemyColor());
      pTop.appendChild(w); positionShipEl(w,pTop,s.fx,displayFy); s.wrap=w;
      s._displayFy=displayFy;
    }
    s.wrap.style.display='';
  });
}

function updateEnemyDisplay(){
  Object.entries(combatants).forEach(([id,c])=>{
    if(id===myId||c.team===myTeam||!c._shipObjs) return;
    c._shipObjs.forEach(s=>{
      s.ownerId=id;
      if(!enemyOnlineShips.includes(s)){
        enemyOnlineShips.push(s);
        const enemyTeam=c.team||'B';
        const displayFy=enemyTeam==='B'?1-s.fy:s.fy;
        const w=createShipEl(s,enemyColor());
        pTop.appendChild(w); positionShipEl(w,pTop,s.fx,displayFy); s.wrap=w;
        s._displayFy=displayFy;
      }
    });
  });
}

function renderOnlineGame(){
  if(phase!=='game') return; // no tocar paneles durante colocación
  const myTurn=(activeTurnId===myId);
  pBot.classList.toggle('can-click',myTurn&&!firingLocked);
  pBot.classList.toggle('no-click',!myTurn||firingLocked);
  pTop.classList.add('no-click'); pTop.classList.remove('can-click');
  if(myTurn) firingLocked=false;
  const nm=combatants[activeTurnId]?combatants[activeTurnId].name:'...';
  phaseMsg.innerHTML=myTurn
    ?`<b style="color:${myColor()}">Tu turno</b>`
    :`<b style="color:var(--muted)">${nm} dispara</b>`;
  phaseMsg.style.display='';
}

function processShot(msg){
  if(!msg.hitShipId) return;
  const owner=combatants[msg.hitOwnerId];
  if(owner&&owner._shipObjs){
    const s=owner._shipObjs.find(s=>s.id===msg.hitShipId);
    if(s) s.hp=Math.max(0,s.hp-1);
  }
}

function applyRivalShot(msg){
  const shooter=combatants[msg._from];
  if(!shooter) return;
  if(shooter.team===myTeam){
    // A teammate fired at our shared enemy fleet (shown in my pTop)
    if(msg.isHit&&msg.hitShipId){
      const s=enemyOnlineShips.find(s=>s.id===msg.hitShipId);
      if(s){
        s.hp=Math.max(0,s.hp-1);
        redrawShipSVG(s,s.hp<=0?'#1a3060':enemyColor());
        const rTop=pTop.getBoundingClientRect();
        const dfy=(s._displayFy!==undefined)?s._displayFy:s.fy;
        const x=s.fx*rTop.width, y=dfy*rTop.height;
        miniExplosion(pTop,x,y,myColor());
        const im=document.createElement('div');im.className='mk impact-mk no-transition hit-shrink';
        im.style.left=x+'px';im.style.top=y+'px';
        im.appendChild(drawImpactSVG(myColor(),true));pTop.appendChild(im);
      }
    }
  } else {
    // Rival fired at my own fleet (shown in my pBot)
    const rTop=pTop.getBoundingClientRect();
    const rBot=pBot.getBoundingClientRect();
    const ec=enemyColor();

    // Shot marker: rival's firing position, mirrored into my pTop
    const shotX=msg.gfx*rTop.width, shotY=(1-msg.gfy)*rTop.height;
    const sm=document.createElement('div');sm.className='mk shot-mk no-transition';
    sm.style.left=shotX+'px';sm.style.top=shotY+'px';
    sm.appendChild(drawShotSVG(ec,msg.isHit));pTop.appendChild(sm);

    if(msg.isHit&&msg.hitShipId){
      const s=myOnlineShips.find(s=>s.id===msg.hitShipId);
      if(s){
        s.hp=Math.max(0,s.hp-1);
        redrawShipSVG(s,s.hp<=0?'#1a3060':myColor());
        const impX=msg.gfx*rBot.width, impY=msg.gfy*rBot.height;
        miniExplosion(pBot,impX,impY,ec);
        const im=document.createElement('div');im.className='mk impact-mk no-transition hit-shrink';
        im.style.left=impX+'px';im.style.top=impY+'px';
        im.appendChild(drawImpactSVG(ec,true));pBot.appendChild(im);
      }
    } else {
      const impX=msg.gfx*rBot.width, impY=msg.gfy*rBot.height;
      const im=document.createElement('div');im.className='mk impact-mk no-transition';
      im.style.left=impX+'px';im.style.top=impY+'px';
      im.appendChild(drawImpactSVG(ec,false));pBot.appendChild(im);
    }
  }
  renderOnlineGame();
}

function getGhostCursor(){

function showGhostCursor(gfx,gfy,color){
  // Show attacker's aim on pTop — where their shots land from the spectator's perspective
  const rTop=pTop.getBoundingClientRect();
  const x=gfx*rTop.width+rTop.left;

function hideGhostCursor(){

function handleFireOnline(e){
  if(gameMode!=='online'||activeTurnId!==myId||firingLocked) return;
  firingLocked=true;

  const r=pBot.getBoundingClientRect();
  const gfx=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  const gfy=Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));

  const rTop=pTop.getBoundingClientRect();
  const sx=gfx*rTop.width, sy=(1-gfy)*rTop.height;

  let hitShip=null, bestDist=Infinity;
  enemyOnlineShips.filter(s=>s.hp>0).forEach(ship=>{
    const displayFy=ship._displayFy!==undefined?ship._displayFy:ship.fy;
    const cx=ship.fx*rTop.width, cy=displayFy*rTop.height;
    let dx=sx-cx, dy=sy-cy;
    if(ship.angleDeg){
      const rad=-ship.angleDeg*Math.PI/180;
      const rdx=dx*Math.cos(rad)-dy*Math.sin(rad);
      const rdy=dx*Math.sin(rad)+dy*Math.cos(rad);
      dx=rdx; dy=rdy;
    }
    const hw=ship.type.w/2, hh=ship.type.h/2;
    if(Math.abs(dx)<=hw&&Math.abs(dy)<=hh){
      const d=Math.sqrt((sx-cx)**2+(sy-cy)**2);
      if(d<bestDist){bestDist=d;hitShip=ship;}
    }
  });

  const isHit=!!hitShip;
  const mc=myColor(), ec=enemyColor();

  const sm=document.createElement('div');sm.className='mk shot-mk no-transition';
  sm.style.left=(gfx*r.width)+'px';sm.style.top=(gfy*r.height)+'px';
  sm.appendChild(drawShotSVG(mc,isHit));pBot.appendChild(sm);

  if(isHit){
    hitShip.hp--;
    redrawShipSVG(hitShip,hitShip.hp<=0?'#1a3060':ec);
    miniExplosion(pTop,sx,sy,mc);
    const im=document.createElement('div');im.className='mk impact-mk no-transition hit-shrink';
    im.style.left=sx+'px';im.style.top=sy+'px';
    im.appendChild(drawImpactSVG(mc,true));pTop.appendChild(im);
  } else {
    const im=document.createElement('div');im.className='mk impact-mk no-transition';
    im.style.left=sx+'px';im.style.top=sy+'px';
    im.appendChild(drawImpactSVG(mc,false));pTop.appendChild(im);
  }

  const shotMsg={type:'shot',gfx,gfy,isHit,
    hitShipId:hitShip?hitShip.id:null,hitOwnerId:hitShip?hitShip.ownerId:null};

  if(isHost){
    broadcastAll(shotMsg);
    processShot({...shotMsg,_from:myId});
  } else {
    sendMsg(shotMsg);
  }

  // Check win condition: all enemy ships sunk
  const allSunk=enemyOnlineShips.every(s=>s.hp<=0);

  setTimeout(()=>{
    if(allSunk){
      // Game over — broadcast and show final
      if(isHost) broadcastAll({type:'game_over',winnerId:myId});
      else sendMsg({type:'game_over',winnerId:myId});
      showFinal();
    } else if(!isHit){
      // Miss → change turn
      showToast('✗','bad','Fallo — turno del rival',1400);
      if(isHost){
        // Host is the turn authority — own messages are filtered by its
        // own Firebase listener, so advance locally and broadcast.
        advanceTurn(myId);
      } else {
        sendTo('host',{type:'turn_done'});
      }
      firingLocked=false;
    } else {
      // Hit → keep turn, unlock to fire again
      showToast('✓','good','¡Impacto! Sigue disparando',1400);
      firingLocked=false;
    }
  },600);
}

  // myPreferredTeam 'B'=turquesa → joiner elige t:'A' (refuerzo, mismo color)

    b.textContent=opt.label;
    b.onclick=()=>{
      myTeam=opt.t==='B'?'A':'B'; // B=enemigo=equipo contrario al host

function showLobbyPlayerList(){}

function showArmingAlert(){

  if(!el) return;

function onPeerLeft(id){
  delete combatants[id];
  broadcastAll({type:'player_left',id});
  if(phase==='game') renderOnlineGame();
}

function reconstructShips(cid,shipArr){
  const c=combatants[cid]; if(!c) return;
  c._shipObjs=shipArr.map(s=>{
    const type=SHIP_TYPES.find(t=>t.id===s.typeId);
    return {type,fx:s.fx,fy:s.fy,hp:s.hp,id:s.id,wrap:null,ownerId:cid,angleDeg:s.angleDeg||0};
  });
}

function buildShipsPayload(){
  const out={};
  Object.entries(combatants).forEach(([id,c])=>{ out[id]=c.ships||[]; });
  return out;
}

function serializeCombatants(){
  const out={};
  Object.entries(combatants).forEach(([id,c])=>{
    out[id]={id,name:c.name,team:c.team,ships:c.ships||[],inGame:!!c.inGame,score:c.score||0};
  });
  return out;
}

function calcAvgLivingShips(){
  const active=Object.values(combatants).filter(c=>c.inGame&&c._shipObjs&&c._shipObjs.length);
  if(!active.length) return 10;
  const total=active.reduce((s,c)=>s+c._shipObjs.filter(sh=>sh.hp>0).length,0);
  return Math.max(1,Math.round(total/active.length));
}

function countLivingShips(cid){
  const c=combatants[cid];
  return c&&c._shipObjs?c._shipObjs.filter(s=>s.hp>0).length:0;
}

function injectTurnAfterCurrent(id){
  // Just let the new player go next
  activeTurnId=id;
}

function advanceTurn(fromId){
  const ids=Object.keys(combatants).filter(id=>combatants[id].inGame);
  if(!ids.length) return;
  const cur=ids.indexOf(activeTurnId);
  activeTurnId=ids[(cur+1)%ids.length];
  broadcastAll({type:'turn_update',activeTurnId});
  renderOnlineGame();
}

function launchPlacement(quota, team){
  onlineShipQuota=quota||10;
  myTeam=team||'B';
  gameMode='online';
  ships={1:[],2:[]};history=[];score={1:0,2:0};remaining={1:[],2:[]};
  [pTop,pBot].forEach(p=>p.querySelectorAll('.mk,.mini-exp,.shot-mk,.impact-mk').forEach(d=>d.remove()));
  lobbyEl.classList.add('hide');
  const jb=document.getElementById('join-box'); if(jb) jb.remove();
  const lb=document.getElementById('lobby-player-list'); if(lb) lb.remove();
  document.getElementById('game-shell').classList.add('show');
  buildPips();
  // Joiner siempre coloca en pBot (slot 2), que es el panel inferior que controla
  const mySlot=2;
  startPlacement(mySlot);
  startPlacementTimer(30,()=>{ if(ships[mySlot].length<onlineShipQuota) randomPlacement(mySlot); });
  showInviteButton();
}

let onlineShipQuota=10;
let placementTimerIv=null;

function startPlacementTimer(secs,onDone){
  stopPlacementTimer();
  let el=document.getElementById('ptimer');
  if(!el){
    el=document.createElement('div');el.id='ptimer';
    el.style.cssText='position:fixed;top:44px;left:50%;transform:translateX(-50%);z-index:80;font-family:Exo 2;font-weight:100;font-size:1.3rem;letter-spacing:4px;color:#a8d4ff;padding:4px 14px;background:rgba(1,9,21,.88);border:1px solid rgba(80,130,220,.2);border-radius:2px;pointer-events:none;';
    document.body.appendChild(el);
  }
  let t=secs; el.textContent='⏱ '+t+'s';
  placementTimerIv=setInterval(()=>{
    t--; el.textContent='⏱ '+t+'s';
    if(t<=5) el.style.color='#ff6b35';
    if(t<=0){ clearInterval(placementTimerIv); el.remove(); onDone(); }
  },1000);
}

function stopPlacementTimer(){
  if(placementTimerIv){ clearInterval(placementTimerIv); placementTimerIv=null; }
  const el=document.getElementById('ptimer'); if(el) el.remove();
}

  document.getElementById('invite-qr-wrap').style.display='none';
  document.getElementById('invite-qr-img').src='';
  overlay.style.display='flex';

  document.getElementById('invite-copy-btn').onclick=()=>{
    const copyBtn=document.getElementById('invite-copy-btn');
    navigator.clipboard.writeText(url).then(()=>{
      copyBtn.textContent='✓ Copiado';
      setTimeout(()=>copyBtn.textContent='📋 Copiar',2000);
    }).catch(()=>{ prompt('Enlace:',url); });
  };

  document.getElementById('invite-qr-btn').onclick=()=>{
    const wrap=document.getElementById('invite-qr-wrap');
    const img=document.getElementById('invite-qr-img');
    if(wrap.style.display==='none'){
      const qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=160x160&bgcolor=e8f4ff&color=010915&data='+encodeURIComponent(url);
      img.src=qrUrl;
      wrap.style.display='block';
      document.getElementById('invite-qr-btn').textContent='▦ Ocultar QR';
    } else {
      wrap.style.display='none';
      document.getElementById('invite-qr-btn').textContent='▦ QR';
    }
  };

  document.getElementById('invite-close-btn').onclick=()=>{ overlay.style.display='none'; };
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.style.display='none'; };
}

/* ── Small ship random flash ── */
function scheduleFlash(ship,color){
  if(!ship||ship.hp<=0||!ship.wrap) return;
  const delay=9000+Math.random()*21000;
  ship._flashTimer=setTimeout(()=>{
    if(!ship.wrap||ship.hp<=0) return;
    const svg=ship.wrap.querySelector('svg');
    if(!svg) return;
    const flash=document.createElementNS('http://www.w3.org/2000/svg','circle');
    flash.setAttribute('cx','4');flash.setAttribute('cy','4');
    flash.setAttribute('r','6');flash.setAttribute('fill',color);
    flash.setAttribute('opacity','0.85');
    svg.appendChild(flash);
    let op=0.85;
    const fade=setInterval(()=>{
      op-=0.07; flash.setAttribute('opacity',String(op));
      if(op<=0){ clearInterval(fade); try{flash.remove();}catch{} }
    },30);
    scheduleFlash(ship,color);
  },delay);
}

function activateSmallFlashes(player){
  ships[player].forEach(s=>{
    if(s.type.id==='xs') scheduleFlash(s,hex(player));
  });
}
